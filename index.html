<body>

    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

    <script>
        // ============================================================
        // ATHOS MAPS - Offline Χάρτης Άγιου Όρους (Μόνο χερσόνησος)
        // ============================================================
        
        var ORS_API_KEY = '5b3ce3597851110001cf6248e2dc8c0afb9f4b0b9e0b8f3c9d3e4f5a6b7c8d9e';
        var GPX_EXPORT_CODE = '10101010';
        
        var map, mainTiles, fallbackTiles, offlineTiles;
        var startPoint=null, startName='Αφετηρία', startMarker=null, startPhoto=null;
        var endPoint=null, endName='Προορισμός', endMarker=null, endPhoto=null;
        var waypoints=[], waypointNames=[], waypointPhotos=[], waypointNotes=[];
        var markers=[], routeLines=[], photoMarkers=[], routePhotos=[];
        var lastMainGeometry=null, lastMainDistance=null;
        var userBlueDot=null, locationWatchId=null, isLocationTracking=false;
        var lastKnownPosition=null, positionHistory=[];
        var mapRotation=0, isDesignMode=false, isMapInteracting=false;
        var offRouteAlertEnabled=false, offRouteAlertShown=false;
        var OFF_ROUTE_THRESHOLD=200, offRouteCheckInterval=null;
        var isAthosMapLoaded = false;
        var athosTiles = null;
        var isDownloading = false;
        
        // ============================================================
        // ΟΡΙΑ ΑΓΙΟΥ ΟΡΟΥΣ - ΠΟΛΥ ΣΤΕΝΗ ΠΕΡΙΟΧΗ
        // ============================================================
        var ATHOS_BOUNDS = {
            // Άγιο Όρος: περίπου 40°05' έως 40°25' Β και 24°10' έως 24°35' Α
            southWest: [40.05, 24.10],
            northEast: [40.42, 24.40]
        };
        
        // Επέκταση λίγο για να συμπεριλάβει και γύρω περιοχές
        var ATHOS_BOUNDS_EXTENDED = {
            southWest: [39.95, 23.95],
            northEast: [40.50, 24.55]
        };
        
        function showToast(msg, color) {
            var t=document.createElement('div');
            t.style.cssText='position:fixed;bottom:150px;left:50%;transform:translateX(-50%);background:'+(color||'rgba(0,0,0,0.85)')+';color:white;padding:10px 18px;border-radius:14px;z-index:9999;font-size:14px;text-align:center;max-width:90%';
            t.innerHTML=msg;
            document.body.appendChild(t);
            setTimeout(function(){t.remove()},4000);
        }
        
        function getColorIcon(c){return L.icon({iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-'+c+'.png',shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.3.1/images/marker-shadow.png',iconSize:[25,41],iconAnchor:[12,41],popupAnchor:[1,-34],shadowSize:[41,41]})}
        
        function formatTime(h){if(h===null||isNaN(h)||h<0)return '-';var m=Math.round(h*60),hh=Math.floor(m/60);m=m%60;if(hh===0&&m===0)return '<1 λεπτό';if(hh===0)return m+' λεπτά';if(m===0)return hh+' ώρα'+(hh!==1?'ες':'');return hh+' ώρα'+(hh!==1?'ες':'')+' '+m+' λεπτά'}
        
        function computeDistance(coords){if(!coords||coords.length<2)return 0;var d=0;for(var i=1;i<coords.length;i++)d+=L.latLng(coords[i-1][1],coords[i-1][0]).distanceTo(L.latLng(coords[i][1],coords[i][0]));return d/1000}
        
        function makeDraggable(el){if(!el)return;var d={isDragging:false,sx:0,sy:0,ox:0,oy:0};function sd(cx,cy){var r=el.getBoundingClientRect();d.isDragging=true;d.sx=cx;d.sy=cy;d.ox=r.left;d.oy=r.top;el.style.position='fixed';el.style.left=r.left+'px';el.style.top=r.top+'px';el.style.bottom='auto';el.style.right='auto';el.style.transform='none';el.style.cursor='grabbing';document.body.style.userSelect='none';el.style.zIndex='9999'}function md(cx,cy){if(!d.isDragging)return;var nx=d.ox+cx-d.sx,ny=d.oy+cy-d.sy;var r=el.getBoundingClientRect();nx=Math.max(10,Math.min(window.innerWidth-r.width-10,nx));ny=Math.max(10,Math.min(window.innerHeight-r.height-10,ny));el.style.left=nx+'px';el.style.top=ny+'px'}function ed(){if(!d.isDragging)return;d.isDragging=false;el.style.cursor='';document.body.style.userSelect='';el.style.zIndex=''}el.addEventListener('mousedown',function(e){if(e.target.closest('button,input,select'))return;sd(e.clientX,e.clientY);e.preventDefault()});document.addEventListener('mousemove',function(e){if(!d.isDragging)return;md(e.clientX,e.clientY);e.preventDefault()});document.addEventListener('mouseup',function(e){if(d.isDragging){ed();e.preventDefault()}});el.addEventListener('touchstart',function(e){if(e.target.closest('button,input,select'))return;var t=e.touches[0];sd(t.clientX,t.clientY);e.preventDefault()},{passive:false});document.addEventListener('touchmove',function(e){if(!d.isDragging)return;var t=e.touches[0];md(t.clientX,t.clientY);e.preventDefault()},{passive:false});document.addEventListener('touchend',function(e){if(d.isDragging){ed();e.preventDefault()}},{passive:false})}
        
        // ============================================================
        // OFFLINE CHART - ΜΟΝΟ ΑΓΙΟ ΟΡΟΣ
        // ============================================================
        
        function getTilesForBounds(bounds, zoom) {
            const tiles = [];
            const [minLat, minLng] = bounds.southWest;
            const [maxLat, maxLng] = bounds.northEast;
            
            const minX = Math.floor((minLng + 180) / 360 * Math.pow(2, zoom));
            const maxX = Math.floor((maxLng + 180) / 360 * Math.pow(2, zoom));
            const minY = Math.floor((1 - Math.log(Math.tan(minLat * Math.PI / 180) + 1 / Math.cos(minLat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, zoom));
            const maxY = Math.floor((1 - Math.log(Math.tan(maxLat * Math.PI / 180) + 1 / Math.cos(maxLat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, zoom));
            
            for (let x = minX; x <= maxX; x++) {
                for (let y = minY; y <= maxY; y++) {
                    tiles.push({ x, y });
                }
            }
            return tiles;
        }

        function compressImage(blob, quality = 0.6) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = 256;
                    canvas.height = 256;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 256, 256);
                    canvas.toBlob(function(compressed) {
                        resolve(compressed);
                    }, 'image/jpeg', quality);
                };
                img.src = URL.createObjectURL(blob);
            });
        }

        function getTileSizeEstimate() {
            // Υπολογισμός εκτιμώμενου μεγέθους
            const zooms = [8, 9, 10, 11, 12, 13, 14, 15, 16];
            let total = 0;
            zooms.forEach(z => {
                const tiles = getTilesForBounds(ATHOS_BOUNDS, z);
                total += tiles.length;
            });
            return total;
        }

        async function downloadAthosMap() {
            if (isDownloading) {
                showToast('⏳ Η λήψη είναι ήδη σε εξέλιξη...', '#f39c12');
                return;
            }
            
            if (isAthosMapLoaded) {
                if (confirm('✅ Ο χάρτης υπάρχει ήδη. Θέλεις να τον κατεβάσεις ξανά;')) {
                    localStorage.removeItem('athos_map_loaded');
                    isAthosMapLoaded = false;
                    if (athosTiles) {
                        map.removeLayer(athosTiles);
                        athosTiles = null;
                    }
                } else {
                    return;
                }
            }
            
            isDownloading = true;
            const btn = document.getElementById('downloadAthosBtn');
            btn.classList.add('loading');
            btn.innerHTML = '⏳ Λήψη...';
            
            const progressDiv = document.getElementById('downloadProgress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            progressDiv.style.display = 'block';
            
            try {
                // Πολλά zoom levels για καλύτερη λεπτομέρεια
                const zoomLevels = [8, 9, 10, 11, 12, 13, 14, 15, 16];
                let totalTiles = 0;
                let loadedTiles = 0;
                let failedTiles = 0;
                
                // Υπολογισμός συνολικών tiles
                zoomLevels.forEach(z => {
                    const tiles = getTilesForBounds(ATHOS_BOUNDS, z);
                    totalTiles += tiles.length;
                });
                
                showToast(`📥 Λήψη ~${totalTiles} tiles για το Άγιο Όρος`, '#1a7a3a');
                
                for (let zi = 0; zi < zoomLevels.length; zi++) {
                    const z = zoomLevels[zi];
                    const tiles = getTilesForBounds(ATHOS_BOUNDS, z);
                    
                    progressText.textContent = `Λήψη zoom ${z} (${zi+1}/${zoomLevels.length}) - ${Math.round((loadedTiles/totalTiles)*100)}%`;
                    
                    // Λήψη σε μικρές παρτίδες
                    const batchSize = 15;
                    for (let i = 0; i < tiles.length; i += batchSize) {
                        const batch = tiles.slice(i, i + batchSize);
                        const promises = batch.map(async (tile) => {
                            try {
                                const url = `https://tile.openstreetmap.org/${z}/${tile.x}/${tile.y}.png`;
                                const response = await fetch(url);
                                if (!response.ok) throw new Error('Network error');
                                const blob = await response.blob();
                                const compressed = await compressImage(blob, 0.55);
                                const reader = new FileReader();
                                return new Promise((resolve) => {
                                    reader.onload = function(e) {
                                        const key = `athos_tile_${z}_${tile.x}_${tile.y}`;
                                        localStorage.setItem(key, e.target.result);
                                        loadedTiles++;
                                        const pct = Math.round((loadedTiles/totalTiles)*100);
                                        progressFill.style.width = pct + '%';
                                        progressText.textContent = `Λήψη zoom ${z} (${zi+1}/${zoomLevels.length}) - ${pct}% (${loadedTiles}/${totalTiles})`;
                                        resolve(true);
                                    };
                                    reader.readAsDataURL(compressed);
                                });
                            } catch (err) {
                                failedTiles++;
                                loadedTiles++;
                                const pct = Math.round((loadedTiles/totalTiles)*100);
                                progressFill.style.width = pct + '%';
                                return false;
                            }
                        });
                        
                        await Promise.all(promises);
                        
                        // Μικρή καθυστέρηση
                        await new Promise(r => setTimeout(r, 80));
                    }
                }
                
                // Αποθήκευση επιτυχίας
                localStorage.setItem('athos_map_loaded', 'true');
                localStorage.setItem('athos_map_date', new Date().toISOString());
                localStorage.setItem('athos_map_tiles', loadedTiles.toString());
                isAthosMapLoaded = true;
                
                // Φόρτωση του offline χάρτη
                loadAthosTiles();
                
                progressText.textContent = `✅ Ολοκληρώθηκε! ${loadedTiles} tiles φορτώθηκαν, ${failedTiles} απέτυχαν`;
                setTimeout(() => {
                    progressDiv.style.display = 'none';
                }, 3000);
                
                showToast(`✅ Λήψη Άγιου Όρους ολοκληρώθηκε! ${loadedTiles} tiles`, '#2c5f2d');
                
            } catch (err) {
                showToast('❌ Σφάλμα κατά τη λήψη: ' + err.message, '#e74c3c');
                progressDiv.style.display = 'none';
            }
            
            isDownloading = false;
            btn.classList.remove('loading');
            btn.innerHTML = '🏔️ Offline';
            btn.classList.add('active');
        }

        function loadAthosTiles() {
            if (localStorage.getItem('athos_map_loaded') !== 'true') {
                return false;
            }
            
            // Δημιουργία custom tile layer
            if (athosTiles) {
                map.removeLayer(athosTiles);
            }
            
            athosTiles = L.tileLayer('', {
                maxZoom: 16,
                minZoom: 8,
                bounds: [ATHOS_BOUNDS.southWest, ATHOS_BOUNDS.northEast],
                crossOrigin: true
            });
            
            // Override δημιουργίας tiles
            athosTiles.createTile = function(coords, done) {
                const tile = document.createElement('img');
                const key = `athos_tile_${coords.z}_${coords.x}_${coords.y}`;
                const data = localStorage.getItem(key);
                
                if (data) {
                    tile.src = data;
                    tile.onload = function() { done(null, tile); };
                    tile.onerror = function() { 
                        // Fallback σε online
                        tile.src = `https://tile.openstreetmap.org/${coords.z}/${coords.x}/${coords.y}.png`;
                        done(null, tile);
                    };
                } else {
                    tile.src = `https://tile.openstreetmap.org/${coords.z}/${coords.x}/${coords.y}.png`;
                    done(null, tile);
                }
                return tile;
            };
            
            map.addLayer(athosTiles);
            
            // Αφαίρεση των άλλων layers
            if (mainTiles) map.removeLayer(mainTiles);
            if (fallbackTiles) map.removeLayer(fallbackTiles);
            
            isAthosMapLoaded = true;
            
            // Εστίαση στο Άγιο Όρος
            const center = [(ATHOS_BOUNDS.southWest[0] + ATHOS_BOUNDS.northEast[0]) / 2, 
                           (ATHOS_BOUNDS.southWest[1] + ATHOS_BOUNDS.northEast[1]) / 2];
            map.setView(center, 13);
            
            showToast('🏔️ Λειτουργία Offline - Άγιο Όρος', '#2c5f2d');
            return true;
        }

        function checkAthosMapStatus() {
            if (localStorage.getItem('athos_map_loaded') === 'true') {
                const btn = document.getElementById('downloadAthosBtn');
                btn.classList.add('active');
                btn.innerHTML = '✅ Offline';
                const tiles = localStorage.getItem('athos_map_tiles') || '?';
                showToast(`🏔️ Offline χάρτης Άγιου Όρους (${tiles} tiles)`, '#2c5f2d');
                loadAthosTiles();
                return true;
            }
            return false;
        }

        function processPhotoForPoint(file,pos,label,pk){
            var r=new FileReader();
            r.onload=function(ev){
                var ph={image:ev.target.result,lat:pos.lat,lng:pos.lng,note:label+' - '+new Date().toLocaleString('el'),filename:file.name||'photo.jpg',timestamp:new Date().toISOString()};
                routePhotos.push(ph);addPhotoMarker(ph);updateInfo();
                if(pk==='start')startPhoto=ev.target.result;
                else if(pk==='end')endPhoto=ev.target.result;
                else if(pk&&pk.startsWith('waypoint_')){
                    var idx=parseInt(pk.split('_')[1]);
                    if(!isNaN(idx)&&idx<waypointPhotos.length){waypointPhotos[idx]=ev.target.result;if(markers[idx])updateWaypointPopup(markers[idx],idx)}
                }
                updateWaypointsPanel();saveLastRouteState();
            };
            r.readAsDataURL(file);
        }

        function updateWaypointsPanel(){
            var list=document.getElementById('waypointsList'),cs=document.getElementById('waypointCount');

            if(endPoint){total++;html+='<li style="padding:4px 0;display:flex;align-items:center;gap:4px;">'+(endPhoto?'<img src="'+endPhoto+'" style="width:22px;height:22px;border-radius:50%;object-fit:cover;border:2px solid #8e44ad;">':'')+'<span style="font-weight:600;font-size:11px;">🏁 '+endName+'</span><button onclick="editEndName()" style="background:#b22222;color:white;border:none;padding:1px 5px;border-radius:3px;cursor:pointer;font-size:8px;">✏️</button></li>'}

        function calculateRoute(){
            if(!startPoint||!endPoint)return;
            var allP=[startPoint].concat(waypoints).concat([endPoint]);
            for(var i=0;i<routeLines.length;i++)map.removeLayer(routeLines[i]);routeLines=[];
            try{
                var coords=allP.map(function(p){return[p.lng,p.lat]});
                fetch('https://api.openrouteservice.org/v2/directions/foot-hiking',{
                    method:'POST',
                    headers:{'Content-Type':'application/json','Authorization':ORS_API_KEY},
                    body:JSON.stringify({coordinates:coords,preference:'recommended',units:'km',geometry:true,geometry_format:'geojson'})
                }).then(function(r){return r.json()}).then(function(data){
                    if(data.features&&data.features[0]){
                        lastMainGeometry=data.features[0].geometry.coordinates;
                        lastMainDistance=(data.features[0].properties?.summary?.distance||0)/1000;
                        var ll=lastMainGeometry.map(function(c){return[c[1],c[0]]});
                        routeLines.push(L.polyline(ll,{color:'#2c5f2d',weight:5,opacity:0.8}).addTo(map));
                        if(!isDesignMode)map.fitBounds(routeLines[0].getBounds(),{padding:[60,60]});
                        updateInfo();saveLastRouteState();
                    }
                }).catch(function(){showToast('❌ Σφάλμα υπολογισμού','#e74c3c')});
            }catch(e){showToast('❌ Σφάλμα','#e74c3c')}
        }
        
        function updateInfo(){
            var sp=parseFloat(document.getElementById('speedSelect').value||4);
            if(lastMainDistance!==null){
                document.getElementById('dist1').innerText=lastMainDistance.toFixed(2);
                document.getElementById('time1').innerText=formatTime(lastMainDistance/sp);
                document.getElementById('difficultyRating').innerText=lastMainDistance>20?'Δύσκολη':lastMainDistance>10?'Μέτρια':'Εύκολη';
            }
            document.getElementById('photoCount').innerText=routePhotos.length;
        }
        
        function saveLastRouteState(){
            try{
                localStorage.setItem('athos_last_route',JSON.stringify({
                    geometry:lastMainGeometry,distance:lastMainDistance,
                    startName:startName,endName:endName,
                    startPoint:startPoint,endPoint:endPoint,
                    startPhoto:startPhoto,endPhoto:endPhoto,
                    waypoints:waypoints.map(function(p,i){return{lat:p.lat,lng:p.lng,name:waypointNames[i]||'Σημείο',photo:waypointPhotos[i]||null,note:waypointNotes[i]||''}}),
                    routePhotos:routePhotos.map(function(p){return p.image})
                }));
            }catch(e){}
        }
        
        function loadLastRouteState(){
            try{
                var d=localStorage.getItem('athos_last_route');if(!d)return;
                var s=JSON.parse(d);if(!s.geometry)return;
                lastMainGeometry=s.geometry;lastMainDistance=s.distance||computeDistance(s.geometry);
                startName=s.startName||'Αφετηρία';endName=s.endName||'Προορισμός';
                startPhoto=s.startPhoto||null;endPhoto=s.endPhoto||null;
                if(s.startPoint){startPoint=s.startPoint;startMarker=L.marker([startPoint.lat,startPoint.lng],{icon:getColorIcon('green'),draggable:true}).addTo(map);updateStartPopup();startMarker.on('dragend',function(e){startPoint=e.target.getLatLng();calculateRoute();updateStartPopup()})}
                if(s.endPoint){endPoint=s.endPoint;endMarker=L.marker([endPoint.lat,endPoint.lng],{icon:getColorIcon('red'),draggable:true}).addTo(map);updateEndPopup();endMarker.on('dragend',function(e){endPoint=e.target.getLatLng();calculateRoute();updateEndPopup()})}
                if(s.waypoints&&s.waypoints.length>0){
                    waypoints=[];waypointNames=[];waypointPhotos=[];waypointNotes=[];markers=[];
                    for(var i=0;i<s.waypoints.length;i++){var w=s.waypoints[i];waypoints.push(L.latLng(w.lat,w.lng));waypointNames.push(w.name||'Σημείο');waypointPhotos.push(w.photo||null);waypointNotes.push(w.note||'');var m=L.marker([w.lat,w.lng],{icon:getColorIcon('blue'),draggable:true}).addTo(map);updateWaypointPopup(m,i);(function(idx){m.on('dragend',function(e){waypoints[idx]=e.target.getLatLng();calculateRoute()})})(i);markers.push(m)}
                    updateWaypointsPanel();
                }
                var ll=s.geometry.map(function(c){return[c[1],c[0]]});routeLines.push(L.polyline(ll,{color:'#2c5f2d',weight:5,opacity:0.8}).addTo(map));map.fitBounds(routeLines[0].getBounds(),{padding:[60,60]});
                if(s.routePhotos){routePhotos=s.routePhotos.map(function(img){return{image:img,lat:s.geometry[0][1],lng:s.geometry[0][0],note:'',filename:'photo.jpg',timestamp:new Date().toISOString()}});for(var j=0;j<routePhotos.length;j++)addPhotoMarker(routePhotos[j])}
                updateInfo();
            }catch(e){}
        }
        
        function toggleMode(){
            isDesignMode=!isDesignMode;
            var btn=document.getElementById('modeToggleBtn');
            if(isDesignMode){btn.innerHTML='✏️ Σχεδίαση';btn.classList.add('design-mode');if(isLocationTracking)stopLocationTracking();showToast('✏️ Mode Σχεδίασης','#e67e22')}
            else{btn.innerHTML='🧭 Πλοήγηση';btn.classList.remove('design-mode');if(!isLocationTracking)locateUser(true);showToast('🧭 Mode Πλοήγησης','#2c5f2d')}
        }
        
        function locateUser(){
            if(isLocationTracking){stopLocationTracking();return}
            if(navigator.geolocation){
                document.getElementById('locateBtn').innerHTML='📍 ✓';document.getElementById('locateBtn').classList.add('active');
                isLocationTracking=true;
                locationWatchId=navigator.geolocation.watchPosition(function(pos){
                    var lat=pos.coords.latitude,lng=pos.coords.longitude;
                    lastKnownPosition={lat:lat,lng:lng};
                    if(!userBlueDot){userBlueDot=L.marker([lat,lng],{icon:L.divIcon({html:'<div class="blue-dot"><div class="blue-dot-glow"></div></div>',className:'',iconSize:[18,18],iconAnchor:[9,9]}),zIndexOffset:1000}).addTo(map)}
                    else userBlueDot.setLatLng([lat,lng]);
                    document.getElementById('statusText').innerHTML='📍 '+lat.toFixed(4)+', '+lng.toFixed(4);
                },function(){stopLocationTracking();locateByIP()},{enableHighAccuracy:true,timeout:15000});
            }else locateByIP();
        }
        
        function stopLocationTracking(){
            if(locationWatchId){navigator.geolocation.clearWatch(locationWatchId);locationWatchId=null}
            isLocationTracking=false;
            document.getElementById('locateBtn').innerHTML='📍 GPS';document.getElementById('locateBtn').classList.remove('active');
            document.getElementById('statusText').innerHTML='Πατήστε GPS';
        }
        
        function locateByIP(){
            fetch('https://ipapi.co/json/').then(function(r){return r.json()}).then(function(d){
                if(d.latitude){lastKnownPosition={lat:d.latitude,lng:d.longitude};if(!userBlueDot)userBlueDot=L.marker([d.latitude,d.longitude],{icon:L.divIcon({html:'<div class="blue-dot"><div class="blue-dot-glow"></div></div>',className:'',iconSize:[18,18],iconAnchor:[9,9]}),zIndexOffset:1000}).addTo(map);else userBlueDot.setLatLng([d.latitude,d.longitude]);map.flyTo([d.latitude,d.longitude],13)}
            }).catch(function(){});
        }
        
        function clearAll(){
            if(startMarker){map.removeLayer(startMarker);startMarker=null}
            if(endMarker){map.removeLayer(endMarker);endMarker=null}
            for(var i=0;i<markers.length;i++)map.removeLayer(markers[i]);markers=[];waypoints=[];waypointNames=[];waypointPhotos=[];waypointNotes=[];
            for(var i=0;i<routeLines.length;i++)map.removeLayer(routeLines[i]);routeLines=[];
            for(var i=0;i<photoMarkers.length;i++)map.removeLayer(photoMarkers[i]);photoMarkers=[];routePhotos=[];
            startPoint=null;endPoint=null;startPhoto=null;endPhoto=null;
            lastMainDistance=null;lastMainGeometry=null;
            document.getElementById('dist1').innerText='-';document.getElementById('time1').innerText='-';document.getElementById('difficultyRating').innerText='-';document.getElementById('photoCount').innerText='0';
            updateWaypointsPanel();localStorage.removeItem('athos_last_route');showToast('🗑️ Καθαρίστηκαν όλα','#e74c3c');
        }
        
        function resetRotation(){
            mapRotation=0;document.getElementById('map').style.transform='rotate(0deg)';document.getElementById('compassArrow').style.transform='rotate(0deg)';showToast('🧭 Βορράς','#888')
        }
        
        // === SOS ===
        function openSosDialog(){
            var msg='🆘 SOS - Athos Maps\n📍 '+(lastKnownPosition?lastKnownPosition.lat+','+lastKnownPosition.lng:'Άγνωστη θέση')+'\n🗺️ https://www.google.com/maps?q='+(lastKnownPosition?lastKnownPosition.lat+','+lastKnownPosition.lng:'');
            if(confirm('📱 Αποστολή SOS;\n\n'+msg+'\n\nΠατήστε OK για SMS'))window.location.href='sms:6988321619?body='+encodeURIComponent(msg);
        }
        
        // === GPX ===
        function performGpxExport(){
            if(!lastMainGeometry){alert('Δεν υπάρχει διαδρομή');return}
            if(prompt('Κωδικός:')!==GPX_EXPORT_CODE){showToast('❌ Λάθος κωδικός','#e74c3c');return}
            var fn=prompt('Όνομα:','athos_route')||'athos_route';
            var gpx='<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="Athos Maps"><trk><name>Διαδρομή</name><trkseg>';
            for(var i=0;i<lastMainGeometry.length;i++)gpx+='<trkpt lat="'+lastMainGeometry[i][1]+'" lon="'+lastMainGeometry[i][0]+'"></trkpt>';
            gpx+='</trkseg></trk></gpx>';
            var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([gpx],{type:'application/gpx+xml'}));a.download=fn+'.gpx';document.body.appendChild(a);a.click();document.body.removeChild(a);showToast('✅ GPX','#1a7a3a');
        }
        
        // === EVENTS ===
        document.getElementById('modeToggleBtn')?.addEventListener('click',toggleMode);
        document.getElementById('locateBtn')?.addEventListener('click',function(){isLocationTracking?stopLocationTracking():locateUser()});
        document.getElementById('clearBtn')?.addEventListener('click',clearAll);
        document.getElementById('sosBtn')?.addEventListener('click',openSosDialog);
        document.getElementById('photoBtn')?.addEventListener('click',function(){takePhoto()});
        document.getElementById('toggleWaypointsBtn')?.addEventListener('click',function(){document.getElementById('waypointsPanel').classList.toggle('active');if(document.getElementById('waypointsPanel').classList.contains('active'))updateWaypointsPanel()});
        document.getElementById('closeWaypointsBtn')?.addEventListener('click',function(){document.getElementById('waypointsPanel').classList.remove('active')});
        document.getElementById('exportGpxBtn')?.addEventListener('click',performGpxExport);
        document.getElementById('saveRouteBtn')?.addEventListener('click',function(){if(lastMainGeometry)saveLastRouteState();showToast('💾 Αποθηκεύτηκε','#2ecc71')});
        document.getElementById('speedSelect')?.addEventListener('change',updateInfo);
        document.getElementById('reloadMapBtn')?.addEventListener('click',function(){map.invalidateSize();showToast('🔄 Επαναφόρτωση','#e67e22')});
        document.getElementById('helpBtn')?.addEventListener('click',function(){alert('🏔️ Athos Maps - Άγιο Όρος\n\n📍 GPS - Εντοπισμός θέσης\n✏️ Σχεδίαση - Δημιουργία διαδρομών\n📸 Φωτογραφίες σε σημεία\n📝 Σημειώσεις σε σημεία\n💾 Αποθήκευση διαδρομών\n📤 Εξαγωγή GPX (κωδικός: 10101010)\n🏔️ Offline χάρτης - Μόνο Άγιο Όρος\n📊 Μέγεθος: ~5-8 MB\n🔍 Zoom έως 16\n🔄 Περιστροφή με 2 δάχτυλα')});
        
        // Κουμπί λήψης offline χάρτη
        document.getElementById('downloadAthosBtn')?.addEventListener('click', downloadAthosMap);
        
        // === ΕΚΚΙΝΗΣΗ ===
        initMap();
        console.log('🏔️ Athos Maps - Offline Χάρτης Άγιου Όρους');
        console.log('✅ Μόνο η χερσόνησος του Άγιου Όρους');
        console.log('📊 Μέγεθος: ~5-8 MB');
        console.log('🔍 Zoom έως 16');
    </script>
</body>
</html>
