        // ============================================================
        // CALCULATE ROUTE - ΜΕ ΚΟΚΚΙΝΗ ΔΙΑΔΡΟΜΗ
        // ============================================================
        function calculateRoute() {
            if (!state.startPoint || !state.endPoint) {
                showToast('❌ Χρειάζονται Start και End σημεία', '#e74c3c');
                return;
            }
            
            const allPoints = [state.startPoint, ...state.waypoints, state.endPoint];
            state.routeLines.forEach(l => state.map.removeLayer(l));
            state.routeLines = [];
            
            showToast('⏳ Υπολογισμός διαδρομής...', '#2980b9');
            
            try {
                const coords = allPoints.map(p => [p.lng, p.lat]);
                
                fetch('https://api.openrouteservice.org/v2/directions/foot-hiking', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': '5b3ce3597851110001cf6248e2dc8c0afb9f4b0b9e0b8f3c9d3e4f5a6b7c8d9e'
                    },
                    body: JSON.stringify({
                        coordinates: coords,
                        preference: 'recommended',
                        units: 'km',
                        geometry: true,
                        geometry_format: 'geojson',
                        elevation: true
                    })
                })
                .then(response => {
                    if (!response.ok) {
                        if (response.status === 429) {
                            throw new Error('Πάρα πολλά αιτήματα. Περιμένετε λίγο.');
                        }
                        throw new Error(`HTTP ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.features && data.features[0]) {
                        const geom = data.features[0].geometry.coordinates;
                        state.lastMainGeometry = geom;
                        state.lastMainDistance = (data.features[0].properties?.summary?.distance || 0) / 1000;
                        state.routeCalculated = true;
                        
                        if (data.features[0].properties?.elevation) {
                            const elev = data.features[0].properties.elevation;
                            let gain = 0, loss = 0;
                            for (let i = 1; i < elev.length; i++) {
                                const diff = elev[i] - elev[i-1];
                                if (diff > 0) gain += diff;
                                else loss += Math.abs(diff);
                            }
                            state.elevationData = { gain, loss };
                        }
                        
                        const ll = geom.map(c => [c[1], c[0]]);
                        // 🔴 ΚΟΚΚΙΝΗ ΔΙΑΔΡΟΜΗ
                        const line = L.polyline(ll, {
                            color: '#e74c3c',
                            weight: 4,
                            opacity: 0.85
                        }).addTo(state.map);
                        state.routeLines.push(line);
                        
                        if (!state.isDesignMode) {
                            state.map.fitBounds(line.getBounds(), { padding: [60, 60] });
                        }
                        
                        updateInfo();
                        saveLastRouteState();
                        showToast(`✅ Διαδρομή: ${state.lastMainDistance.toFixed(2)} km`, '#e74c3c');
                    } else {
                        showToast('❌ Δεν βρέθηκε διαδρομή - δοκιμάστε άλλους προορισμούς', '#e74c3c');
                    }
                })
                .catch(err => {
                    console.error('Routing error:', err);
                    if (!state.routeCalculated) {
                        showToast(`❌ Σφάλμα: ${err.message}`, '#e74c3c');
                        calculateRouteGraphHopper(allPoints);
                    } else {
                        calculateRouteGraphHopper(allPoints);
                    }
                });
            } catch (e) {
                console.error('Route error:', e);
                if (!state.routeCalculated) {
                    showToast('❌ Σφάλμα υπολογισμού', '#e74c3c');
                    calculateRouteGraphHopper(allPoints);
                } else {
                    calculateRouteGraphHopper(allPoints);
                }
            }
        }

        function calculateRouteGraphHopper(allPoints) {
            try {
                let url = 'https://graphhopper.com/api/1/route?key=5fece833-cd75-4373-a6ba-a4137d3f5132&profile=foot&points_encoded=false&calc_points=true&elevation=true';
                allPoints.forEach(p => {
                    url += '&point=' + p.lat + ',' + p.lng;
                });
                
                fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    if (data.paths && data.paths[0]) {
                        const geom = data.paths[0].points.coordinates;
                        state.lastMainGeometry = geom;
                        state.lastMainDistance = data.paths[0].distance / 1000;
                        state.routeCalculated = true;
                        
                        if (data.paths[0].points.elevation) {
                            const elev = data.paths[0].points.elevation;
                            let gain = 0, loss = 0;
                            for (let i = 1; i < elev.length; i++) {
                                const diff = elev[i] - elev[i-1];
                                if (diff > 0) gain += diff;
                                else loss += Math.abs(diff);
                            }
                            state.elevationData = { gain, loss };
                        }
                        
                        const ll = geom.map(c => [c[1], c[0]]);
                        // 🔴 ΚΟΚΚΙΝΗ ΔΙΑΔΡΟΜΗ
                        const line = L.polyline(ll, {
                            color: '#e74c3c',
                            weight: 4,
                            opacity: 0.85
                        }).addTo(state.map);
                        state.routeLines.push(line);
                        
                        if (!state.isDesignMode) {
                            state.map.fitBounds(line.getBounds(), { padding: [60, 60] });
                        }
                        
                        updateInfo();
                        saveLastRouteState();
                        showToast(`✅ Διαδρομή (GraphHopper): ${state.lastMainDistance.toFixed(2)} km`, '#e74c3c');
                    } else {
                        if (!state.routeCalculated) {
                            showToast('❌ Αποτυχία υπολογισμού διαδρομής', '#e74c3c');
                        }
                    }
                })
                .catch(err => {
                    console.error('GraphHopper error:', err);
                    if (!state.routeCalculated) {
                        showToast('❌ Αποτυχία υπολογισμού διαδρομής', '#e74c3c');
                    }
                });
            } catch (e) {
                if (!state.routeCalculated) {
                    showToast('❌ Αποτυχία υπολογισμού διαδρομής', '#e74c3c');
                }
            }
        }

        function updateInfo() {
            if (state.lastMainDistance !== null && state.lastMainDistance > 0) {
                document.getElementById('dist1').textContent = state.lastMainDistance.toFixed(2);
                updateTimeDisplay();
                
                let difficulty = 'Εύκολη';
                if (state.lastMainDistance > 20) difficulty = 'Δύσκολη';
                else if (state.lastMainDistance > 10) difficulty = 'Μέτρια';
                document.getElementById('difficultyRating').textContent = difficulty;
            } else {
                document.getElementById('dist1').textContent = '-';
                document.getElementById('time1').textContent = '-';
                document.getElementById('difficultyRating').textContent = '-';
            }
            document.getElementById('photoCount').textContent = state.routePhotos.length;
        }

        // ============================================================
        // SAVE / LOAD STATE
        // ============================================================
        function saveLastRouteState() {
            try {
                const data = {
                    geometry: state.lastMainGeometry,
                    distance: state.lastMainDistance,
                    startName: state.startName,
                    endName: state.endName,
                    startPoint: state.startPoint,
                    endPoint: state.endPoint,
                    waypoints: state.waypoints.map((p, i) => ({
                        lat: p.lat,
                        lng: p.lng,
                        name: state.waypointNames[i] || 'Σημείο',
                        note: state.waypointNotes[i] || ''
                    })),
                    routePhotos: state.routePhotos.map(p => p.image),
                    routeName: state.lastRouteName,
                    elevationData: state.elevationData,
                    routeCalculated: state.routeCalculated
                };
                localStorage.setItem('athos_last_route', JSON.stringify(data));
            } catch (e) {}
        }

        function loadLastRouteState() {
            try {
                const raw = localStorage.getItem('athos_last_route');
                if (!raw) return;
                const data = JSON.parse(raw);
                if (!data.geometry) return;
                
                state.lastMainGeometry = data.geometry;
                state.lastMainDistance = data.distance || computeDistance(data.geometry);
                state.startName = data.startName || 'Αφετηρία';
                state.endName = data.endName || 'Προορισμός';
                state.lastRouteName = data.routeName || null;
                state.elevationData = data.elevationData || null;
                state.routeCalculated = data.routeCalculated || true;
                
                if (state.lastRouteName) {
                    document.getElementById('routeNameDisplay').textContent = state.lastRouteName;
                }
                
                if (data.startPoint) {
                    state.startPoint = data.startPoint;
                    state.startMarker = L.marker([data.startPoint.lat, data.startPoint.lng], {
                        icon: getColorIcon('green'),
                        draggable: true
                    }).addTo(state.map);
                    state.startMarker.bindPopup('🚩 ' + state.startName);
                    state.startMarker.on('dragend', function(e) {
                        state.startPoint = e.target.getLatLng();
                        calculateRoute();
                    });
                }
                
                if (data.endPoint) {
                    state.endPoint = data.endPoint;
                    state.endMarker = L.marker([data.endPoint.lat, data.endPoint.lng], {
                        icon: getColorIcon('red'),
                        draggable: true
                    }).addTo(state.map);
                    state.endMarker.bindPopup('🏁 ' + state.endName);
                    state.endMarker.on('dragend', function(e) {
                        state.endPoint = e.target.getLatLng();
                        calculateRoute();
                    });
                }
                
                if (data.waypoints && data.waypoints.length > 0) {
                    state.waypoints = [];
                    state.waypointNames = [];
                    state.waypointNotes = [];
                    state.markers = [];
                    
                    for (let i = 0; i < data.waypoints.length; i++) {
                        const w = data.waypoints[i];
                        state.waypoints.push(L.latLng(w.lat, w.lng));
                        state.waypointNames.push(w.name || 'Σημείο');
                        state.waypointNotes.push(w.note || '');
                        
                        const m = L.marker([w.lat, w.lng], {
                            icon: getColorIcon('blue'),
                            draggable: true
                        }).addTo(state.map);
                        updateWaypointPopup(m, i);
                        m.on('dragend', function(e) {
                            state.waypoints[i] = e.target.getLatLng();
                            calculateRoute();
                        });
                        state.markers.push(m);
                    }
                    updateWaypointsPanel();
                }
                
                const ll = data.geometry.map(c => [c[1], c[0]]);
                // 🔴 ΚΟΚΚΙΝΗ ΔΙΑΔΡΟΜΗ
                const line = L.polyline(ll, { 
                    color: '#e74c3c',
                    weight: 4,
                    opacity: 0.85
                }).addTo(state.map);
                state.routeLines.push(line);
                state.map.fitBounds(line.getBounds(), { padding: [60, 60] });
                
                if (data.routePhotos) {
                    state.routePhotos = data.routePhotos.map(img => ({
                        image: img,
                        lat: data.geometry[0][1],
                        lng: data.geometry[0][0],
                        note: '',
                        filename: 'photo.jpg',
                        timestamp: new Date().toISOString()
                    }));
                    for (const ph of state.routePhotos) {
                        addPhotoMarker(ph);
                    }
                }
                
                updateInfo();
            } catch (e) {}
        }

        // ============================================================
        // CLEAR ALL
        // ============================================================
        function clearAll() {
            if (!confirm('🗑️ Διαγραφή όλων των σημείων και διαδρομών;')) return;
            
            if (state.startMarker) { state.map.removeLayer(state.startMarker); state.startMarker = null; }
            if (state.endMarker) { state.map.removeLayer(state.endMarker); state.endMarker = null; }
            state.markers.forEach(m => state.map.removeLayer(m));
            state.markers = [];
            state.waypoints = [];
            state.waypointNames = [];
            state.waypointNotes = [];
            state.routeLines.forEach(l => state.map.removeLayer(l));
            state.routeLines = [];
            state.photoMarkers.forEach(m => state.map.removeLayer(m));
            state.photoMarkers = [];
            state.routePhotos = [];
            
            state.startPoint = null;
            state.endPoint = null;
            state.lastMainDistance = null;
            state.lastMainGeometry = null;
            state.lastRouteName = null;
            state.elevationData = null;
            state.routeCalculated = false;
            
            document.getElementById('dist1').textContent = '-';
            document.getElementById('time1').textContent = '-';
            document.getElementById('photoCount').textContent = '0';
            document.getElementById('routeNameDisplay').textContent = '-';
            document.getElementById('difficultyRating').textContent = '-';
            
            updateWaypointsPanel();
            localStorage.removeItem('athos_last_route');
            showToast('🗑️ Καθαρίστηκαν όλα', '#c0392b');
        }

        // ============================================================
        // SOS
        // ============================================================
        function openSosDialog() {
            document.getElementById('sosContainer').classList.add('active');
            if (state.userBlueDot) {
                const pos = state.userBlueDot.getLatLng();
                document.getElementById('sosCoords').textContent = pos.lat.toFixed(6) + ', ' + pos.lng.toFixed(6);
            } else if (state.lastKnownPosition) {
                document.getElementById('sosCoords').textContent = state.lastKnownPosition.lat.toFixed(6) + ', ' + state.lastKnownPosition.lng.toFixed(6);
            } else {
                document.getElementById('sosCoords').textContent = 'Άγνωστη θέση';
            }
        }

        function closeSosDialog() {
            document.getElementById('sosContainer').classList.remove('active');
        }

        function genSosMsg() {
            const pos = document.getElementById('sosCoords').textContent;
            return `🆘 SOS - Athos Maps\n👤 ${document.getElementById('sosName').value || 'Ανώνυμος'}\n🆘 ${document.getElementById('sosType').value}\n📱 ${document.getElementById('sosPhone').value || '-'}\n📍 ${pos}\n📝 ${document.getElementById('sosHistory').value || '-'}`;
        }

        function sendSosSms() {
            const msg = genSosMsg();
            if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                window.location.href = 'sms:6988321619?body=' + encodeURIComponent(msg);
            } else {
                navigator.clipboard.writeText(msg).then(() => {
                    showToast('✅ Αντιγράφηκε', '#27ae60');
                });
            }
            closeSosDialog();
        }

        function sendSosEmail() {
            window.location.href = 'mailto:athosmaps@gmail.com?subject=🆘 SOS Athos Maps&body=' + encodeURIComponent(genSosMsg());
            closeSosDialog();
        }

        function call112() {
            if (confirm('📞 Κλήση 112;')) {
                window.location.href = 'tel:112';
            }
            closeSosDialog();
        }

        // ============================================================
        // EVENTS
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            // Δημιουργία κουμπιού mode στο header
            const header = document.querySelector('.header');
            const modeBtn = document.createElement('button');
            modeBtn.id = 'modeToggleBtn';
            modeBtn.title = 'Εναλλαγή Πλοήγησης/Σχεδίασης';
            modeBtn.innerHTML = '<span class="tooltip">Πλοήγηση/Σχεδίαση</span>🧭';
            
            const routesBtn = header.querySelector('#routesBtn');
            if (routesBtn) {
                header.insertBefore(modeBtn, routesBtn);
            } else {
                header.appendChild(modeBtn);
            }
            
            modeBtn.addEventListener('click', toggleDesignMode);

            // Speed group
            setupSpeedGroup();

            openDB().then(() => {
                console.log('💾 IndexedDB ready');
            }).catch(e => console.warn('DB error:', e));

            initMap();
            loadLastRouteState();
            
            if (!isOnlineAccessGranted && !localStorage.getItem('athos_online_granted')) {
                setTimeout(() => {
                    if (confirm('🔐 Για online πρόσβαση χρειάζεται κωδικός. Θέλετε να συνδεθείτε;')) {
                        showCodeModal();
                    }
                }, 1500);
            }
            if (localStorage.getItem('athos_online_granted') === 'true') {
                isOnlineAccessGranted = true;
            }

            document.getElementById('routesBtn').addEventListener('click', showRouteDropdown);
            document.getElementById('closeRoutesBtn').addEventListener('click', hideRouteDropdown);
            document.getElementById('closeRoutesBtn2').addEventListener('click', hideRouteDropdown);
            document.getElementById('routeSearch').addEventListener('input', function(e) {
                renderRoutesList(e.target.value);
            });

            document.getElementById('toggleOfflineBtn').addEventListener('click', async function() {
                if (state.isOfflineMode) {
                    disableOfflineMode();
                } else {
                    const count = await getTileCountFromDB();
                    if (count === 0) {
                        showToast('❌ Δεν υπάρχουν offline tiles. Κάνε λήψη πρώτα.', '#e74c3c');
                        if (confirm('Θέλεις να κατεβάσεις τον offline χάρτη τώρα;')) {
                            downloadOfflineMap();
                        }
                        return;
                    }
                    enableOfflineMode();
                }
            });

            document.getElementById('downloadBtn').addEventListener('click', downloadOfflineMap);
            document.getElementById('clearCacheBtn').addEventListener('click', async function() {
                if (!confirm('🗑️ Διαγραφή όλων των offline tiles;')) return;
                await clearTilesDB();
                if (state.isOfflineMode) disableOfflineMode();
                updateCacheInfo();
                showToast('🗑️ Cache καθαρίστηκε', '#c0392b');
            });

            document.getElementById('statusBtn').addEventListener('click', async function() {
                const info = await updateCacheInfo();
                const size = await getDBSize();
                alert(`📊 Κατάσταση Cache\n\n📦 Tiles: ${info.count}\n💾 Μέγεθος: ${(size/1024/1024).toFixed(2)} MB\n📥 Λειτουργία: ${state.isOfflineMode ? 'OFFLINE' : 'ONLINE'}\n🔐 Online Access: ${isOnlineAccessGranted ? '✅ Ενεργό' : '❌ Απενεργοποιημένο'}`);
            });

            document.getElementById('locateBtn').addEventListener('click', locateUser);
            document.getElementById('sosBtn').addEventListener('click', openSosDialog);
            document.getElementById('closeSosBtn').addEventListener('click', closeSosDialog);
            document.getElementById('sosSendSms').addEventListener('click', sendSosSms);
            document.getElementById('sosSendEmail').addEventListener('click', sendSosEmail);
            document.getElementById('sosCall112').addEventListener('click', call112);

            document.getElementById('photoBtn').addEventListener('click', function() {
                takePhoto();
            });

            document.getElementById('clearBtn').addEventListener('click', clearAll);

            document.getElementById('saveRouteBtn').addEventListener('click', function() {
                if (state.lastMainGeometry) {
                    saveLastRouteState();
                    showToast('💾 Αποθηκεύτηκε', '#2ecc71');
                } else {
                    showToast('❌ Δεν υπάρχει διαδρομή', '#e74c3c');
                }
            });

            document.getElementById('exportGpxBtn').addEventListener('click', performGpxExport);
            document.getElementById('reloadMapBtn').addEventListener('click', function() {
                state.map.invalidateSize();
                showToast('🔄 Επαναφόρτωση', '#e67e22');
            });

            document.getElementById('toggleWaypointsBtn').addEventListener('click', function() {
                document.getElementById('waypointsPanel').classList.toggle('active');
                if (document.getElementById('waypointsPanel').classList.contains('active')) {
                    updateWaypointsPanel();
                }
            });
            document.getElementById('closeWaypointsBtn').addEventListener('click', function() {
                document.getElementById('waypointsPanel').classList.remove('active');
            });

            document.getElementById('helpBtn').addEventListener('click', function() {
                alert('🏔️ Athos Maps\n\n' +
                    '📥 Offline mode: ΠΑΝΤΑ από cache\n' +
                    '⬇️ Λήψη: Κατέβασε τον χάρτη\n' +
                    '📍 GPS: Εντοπισμός θέσης\n' +
                    '🗺️ Διαδρομές: 143 διαδρομές αλφαβητικά\n' +
                    '⏱️ Ταχύτητα: 🐢 Αργή, 🚶 Μέτρια, 🏃 Γρήγορη\n' +
                    '✏️ Σχεδίαση: Πατήστε στο χάρτη\n' +
                    '📸 Φωτογραφίες: Σημεία\n' +
                    '📝 Σημειώσεις: Σε κάθε σημείο\n' +
                    '💾 Αποθήκευση: Τοπικά\n' +
                    '📤 GPX: Με κωδικό\n' +
                    '🔐 Online: Απαιτεί κωδικό\n' +
                    '🔗 agionorosroutes.blogspot.com');
            });

            document.getElementById('fileInput').addEventListener('change', function(e) {
                if (e.target.files && e.target.files[0]) {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        try {
                            const data = parseGPX(ev.target.result);
                            if (data.tracks.length > 0) {
                                const coords = data.tracks[0];
                                state.lastMainGeometry = coords.map(c => [c[1], c[0]]);
                                state.lastMainDistance = computeDistance(coords.map(c => [c[1], c[0]]));
                                state.routeCalculated = true;
                                const line = L.polyline(coords, { color: '#e74c3c', weight: 4, opacity: 0.85 }).addTo(state.map);
                                state.routeLines.push(line);
                                state.map.fitBounds(line.getBounds(), { padding: [60, 60] });
                                updateInfo();
                                saveLastRouteState();
                                showToast('✅ GPX φορτώθηκε', '#2c5f2d');
                            }
                        } catch (err) {
                            showToast('❌ Σφάλμα: ' + err.message, '#e74c3c');
                        }
                    };
                    reader.readAsText(file);
                }
                this.value = '';
            });
            
            // Code modal events
            document.getElementById('codeConfirm').addEventListener('click', confirmCode);
            document.getElementById('codeCancel').addEventListener('click', hideCodeModal);
            document.getElementById('codeInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') confirmCode();
            });
            document.getElementById('codeModal').addEventListener('click', function(e) {
                if (e.target === this) hideCodeModal();
            });
        });

        // ============================================================
        // START
        // ============================================================
        console.log('🏔️ Athos Maps - UI Βελτιωμένο για Κινητό');
        console.log(`📂 ${ROUTES.length} διαδρομές - Αλφαβητική σειρά`);
        console.log('🔴 Κόκκινη διαδρομή για καλύτερη ορατότητα');
        console.log('📊 Μεγάλα γράμματα στο info panel');
        console.log('📱 Μεγαλύτερα κουμπιά στο header');
        console.log('🔗 agionorosroutes.blogspot.com');
    </script>
</body>
