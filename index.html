<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Athos Maps - Όλες οι Διαδρομές</title>
    <meta name="theme-color" content="#2c5f2d">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;overflow:hidden;height:100%;touch-action:pan-x pan-y}
        #map{height:100vh;width:100vw;z-index:1;background:#1a1a2e}
        
        /* ============================================================
           HEADER - ΜΕΓΑΛΥΤΕΡΑ ΚΟΥΜΠΙΑ, ΚΑΛΥΤΕΡΗ ΔΙΑΤΑΞΗ
           ============================================================ */
        .header{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(26,26,46,0.95);padding:3px 5px;display:flex;flex-wrap:wrap;gap:3px;justify-content:center;max-height:64px;overflow:hidden;backdrop-filter:blur(8px);border-bottom:2px solid #2c5f2d;align-items:center}
        .header button,.header select{padding:4px 7px;font-size:9px;border-radius:4px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.08);color:white;cursor:pointer;min-height:24px;transition:all 0.2s;touch-action:manipulation;position:relative;min-width:28px}
        .header button{background:#2c5f2d;color:white;border:none;font-weight:600}
        .header button:active{transform:scale(0.92)}
        .header button.primary{background:#1a7a3a}
        .header button.danger{background:#c0392b}
        .header button.warning{background:#e67e22}
        .header button.active{background:#27ae60;box-shadow:0 0 12px rgba(39,174,96,0.4)}
        .header button.offline-mode{background:#2980b9}
        .header button.offline-mode.active{background:#27ae60;box-shadow:0 0 12px rgba(39,174,96,0.4)}
        .header button.route-btn{background:#8e44ad}
        .header button .tooltip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:white;padding:2px 8px;border-radius:4px;font-size:8px;white-space:nowrap;pointer-events:none;z-index:9999;margin-bottom:3px}
        .header button:hover .tooltip,.header button:focus .tooltip{display:block}
        .header select{background:rgba(255,255,255,0.12);color:#ddd;padding:2px 5px;max-width:70px;font-size:8px;border:1px solid rgba(255,255,255,0.08);min-height:24px}
        .header select option{color:#333}
        .header .badge{font-size:7px;background:rgba(255,255,255,0.12);padding:0 5px;border-radius:6px;display:inline-flex;align-items:center;color:#aaa;min-height:16px}
        .header .badge.has-tiles{background:rgba(39,174,96,0.25);color:#4CAF50}
        .header .badge.routes-badge{background:rgba(142,68,173,0.25);color:#bb86fc}
        .header .logo-link{display:inline-flex;align-items:center;padding:0 3px;text-decoration:none;order:99}
        .header .logo-link img{height:16px;width:auto;max-width:70px;object-fit:contain;border-radius:3px}
        
        /* Speed Group */
        .speed-group{display:inline-flex;align-items:center;gap:1px;background:rgba(255,255,255,0.06);border-radius:4px;padding:1px 3px}
        .speed-group button{background:transparent;color:#888;border:none;padding:2px 4px;font-size:8px;cursor:pointer;border-radius:3px;min-height:20px;min-width:20px}
        .speed-group button:hover{background:rgba(255,255,255,0.08)}
        .speed-group button.active{background:rgba(76,175,80,0.2);color:#4CAF50}
        .speed-group button .spd-icon{font-size:10px;display:block;text-align:center}
        .speed-group button .spd-label{font-size:6px;display:block;text-align:center;color:#777;margin-top:0px}
        .speed-group button.active .spd-label{color:#4CAF50}
        
        /* ============================================================
           INFO PANEL - ΜΕΓΑΛΥΤΕΡΑ ΓΡΑΜΜΑΤΑ
           ============================================================ */
        .info-panel{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);z-index:900;background:rgba(26,26,46,0.95);padding:8px 16px;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,0.6);font-size:14px;text-align:center;min-width:220px;max-width:94%;border:1px solid rgba(255,255,255,0.08);cursor:grab;backdrop-filter:blur(8px);color:#eee;user-select:none}
        .info-panel .main-info{font-size:18px;font-weight:700;color:#4CAF50;letter-spacing:0.5px}
        .info-panel .main-info .dist{font-size:24px;font-weight:800;color:#4CAF50}
        .info-panel .main-info .time-val{font-size:20px;font-weight:700;color:#4CAF50}
        .info-panel .sub-info{font-size:12px;color:#aaa;margin-top:2px}
        .info-panel .sub-info .route-name{color:#bb86fc;font-weight:600}
        .info-panel .status-line{font-size:10px;color:#4CAF50;background:rgba(76,175,80,0.12);padding:3px 12px;border-radius:6px;display:inline-block;margin-top:4px;font-weight:600}
        
        #downloadProgress{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(0,0,0,0.92);color:white;padding:6px 14px;border-radius:14px;font-size:10px;display:none;min-width:160px;text-align:center}
        #downloadProgress .bar{width:100%;height:3px;background:#333;border-radius:2px;margin-top:3px;overflow:hidden}
        #downloadProgress .bar .fill{height:100%;background:#4CAF50;width:0%;transition:width 0.3s}
        
        .status-badge{position:fixed;top:58px;right:4px;z-index:999;background:rgba(0,0,0,0.85);color:white;padding:2px 6px;border-radius:8px;font-size:7px;font-weight:600;backdrop-filter:blur(4px);pointer-events:none}
        .status-badge.online{background:rgba(39,174,96,0.85)}
        .status-badge.offline{background:rgba(41,128,185,0.85)}
        
        .compass-indicator{position:fixed;bottom:100px;right:6px;z-index:2000;background:rgba(26,26,46,0.95);border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 12px rgba(0,0,0,0.4);border:2px solid #2196F3;cursor:pointer}
        .compass-indicator .north-mark{position:absolute;top:2px;font-size:7px;color:#e74c3c;font-weight:700}
        
        .leaflet-control-zoom{z-index:800!important;margin-top:58px!important}
        .leaflet-control-zoom a{background:rgba(26,26,46,0.95)!important;color:#eee!important}
        
        #routeDropdown{position:fixed;top:60px;left:0;right:0;bottom:0;z-index:1200;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;padding:10px}
        #routeDropdown.active{display:flex}
        #routeDropdown .dropdown-content{background:rgba(26,26,46,0.98);border-radius:14px;padding:12px 14px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;border:2px solid #8e44ad;color:#eee}
        #routeDropdown .dropdown-content h3{color:#bb86fc;font-size:14px;margin-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:6px}
        #routeDropdown .route-item{display:flex;justify-content:space-between;align-items:center;padding:4px 6px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;border-radius:4px;gap:4px;font-size:9px}
        #routeDropdown .route-item:hover{background:rgba(255,255,255,0.05)}
        #routeDropdown .route-item .route-name{flex:1;min-width:0;color:#eee}
        #routeDropdown .route-item .route-name .start-end{font-size:7px;color:#888}
        #routeDropdown .route-item button{background:transparent;border:none;color:#4CAF50;cursor:pointer;font-size:9px;padding:2px 6px}
        #routeDropdown .route-item button.danger{color:#e74c3c}
        #routeDropdown .route-search{width:100%;padding:5px 8px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:white;font-size:9px;margin-bottom:8px}
        #routeDropdown .route-search::placeholder{color:#666}
        #routeDropdown .close-routes{background:#555;color:white;border:none;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:9px;margin-top:6px;width:100%}
        #routeDropdown .route-count{font-size:8px;color:#888;text-align:center;padding:4px}
        #routeDropdown .letter-header{font-size:11px;font-weight:700;color:#bb86fc;padding:6px 4px 2px 4px;border-bottom:1px solid rgba(255,255,255,0.05);margin-top:4px}
        
        #waypointsPanel{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);z-index:950;background:rgba(26,26,46,0.97);padding:6px 10px;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.5);max-height:240px;overflow-y:auto;display:none;font-size:9px;min-width:240px;width:92%;max-width:360px;border:2px solid #2980b9;color:#eee}
        #waypointsPanel.active{display:block}
        #waypointsPanel .wp-item{display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.05);flex-wrap:wrap}
        #waypointsPanel .wp-item .wp-name{font-weight:600;font-size:9px;flex:1;min-width:40px;color:#eee}
        #waypointsPanel .wp-item .wp-btn{background:transparent;border:none;padding:1px 4px;cursor:pointer;font-size:7px;color:#888}
        #waypointsPanel .wp-item .wp-btn.primary{color:#4CAF50}
        #waypointsPanel .wp-item .wp-btn.danger{color:#e74c3c}
        
        #sosContainer{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3000;background:rgba(26,26,46,0.98);padding:14px 18px;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,0.5);display:none;max-width:360px;width:92%;max-height:85vh;overflow-y:auto;border:2px solid #e74c3c;color:#eee}
        #sosContainer.active{display:block}
        #sosContainer input,#sosContainer select,#sosContainer textarea{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:white;padding:5px 7px;border-radius:6px;width:100%;font-size:11px;margin:3px 0}
        #sosContainer input::placeholder,#sosContainer textarea::placeholder{color:#666}
        #sosContainer select option{color:#333}
        
        .photo-marker{background:white;border-radius:50%;width:28px;height:28px;border:3px solid #8e44ad;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.4);cursor:pointer}
        .photo-marker img{width:100%;height:100%;object-fit:cover}
        
        .blue-dot{background:#2196F3;border-radius:50%;width:16px;height:16px;border:2px solid white;box-shadow:0 0 0 3px rgba(33,150,243,0.3);display:block;position:relative}
        .blue-dot::after{content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%);border-left:3px solid transparent;border-right:3px solid transparent;border-bottom:6px solid #2196F3}
        .blue-dot-glow{background:rgba(33,150,243,0.15);border-radius:50%;width:30px;height:30px;position:absolute;top:-7px;left:-7px;animation:pulse 2s infinite}
        @keyframes pulse{0%{transform:scale(1);opacity:0.6}50%{transform:scale(1.4);opacity:0.15}100%{transform:scale(1);opacity:0.6}}
        
        .design-indicator{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(230,126,34,0.9);color:white;padding:2px 12px;border-radius:0 0 8px 8px;font-size:8px;font-weight:700;display:none;pointer-events:none}
        .design-indicator.active{display:block}
        
        #codeModal{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center}
        #codeModal.active{display:flex}
        #codeModal .modal-content{background:#1a1a2e;border-radius:16px;padding:20px;max-width:340px;width:92%;border:2px solid #2980b9;color:#eee;text-align:center}
        #codeModal .modal-content h3{color:#4CAF50;font-size:16px;margin-bottom:8px}
        #codeModal .modal-content p{font-size:11px;color:#888;margin-bottom:12px}
        #codeModal .modal-content input{width:100%;padding:8px 12px;font-size:16px;border-radius:8px;border:2px solid #333;background:rgba(255,255,255,0.05);color:white;text-align:center;letter-spacing:3px;font-family:monospace}
        #codeModal .modal-content input:focus{outline:none;border-color:#4CAF50}
        #codeModal .modal-content .btn-group{display:flex;gap:8px;margin-top:12px}
        #codeModal .modal-content .btn-group button{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer}
        #codeModal .modal-content .btn-group .confirm{background:#4CAF50;color:white}
        #codeModal .modal-content .btn-group .cancel{background:#555;color:white}
        #codeModal .modal-content .error{color:#e74c3c;font-size:10px;margin-top:6px;display:none}
        
        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media(max-width:600px){
            .header{max-height:68px;padding:2px 4px;gap:3px}
            .header button,.header select{font-size:8px;padding:3px 5px;min-height:22px;min-width:24px}
            .header select{max-width:60px;font-size:7px}
            .header .logo-link img{height:14px;max-width:55px}
            .info-panel{bottom:50px;font-size:12px;min-width:160px;padding:6px 12px}
            .info-panel .main-info{font-size:15px}
            .info-panel .main-info .dist{font-size:20px}
            .info-panel .main-info .time-val{font-size:17px}
            .info-panel .sub-info{font-size:10px}
            .compass-indicator{bottom:90px;right:4px;width:32px;height:32px;font-size:15px}
            #waypointsPanel{bottom:100px;min-width:180px;max-height:160px;font-size:8px}
            .leaflet-control-zoom{margin-top:62px!important}
            #routeDropdown .dropdown-content{padding:8px 10px}
            #routeDropdown .route-item{font-size:8px;padding:3px 4px}
            .speed-group button{padding:1px 3px;font-size:7px;min-height:18px;min-width:18px}
            .speed-group button .spd-icon{font-size:9px}
            .speed-group button .spd-label{font-size:5px}
            .status-badge{top:62px;font-size:6px}
            .design-indicator{top:62px;font-size:7px}
        }
        @media(max-width:400px){
            .header button,.header select{font-size:7px;padding:2px 3px;min-height:20px;min-width:20px}
            .header{max-height:62px;gap:2px}
            .header select{max-width:50px;font-size:6px}
            .header .logo-link img{height:12px;max-width:45px}
            .info-panel .main-info{font-size:13px}
            .info-panel .main-info .dist{font-size:17px}
            .info-panel .main-info .time-val{font-size:15px}
            .speed-group button{padding:1px 2px;font-size:6px;min-height:16px;min-width:16px}
            .speed-group button .spd-icon{font-size:8px}
        }
        @media(min-width:601px){
            .header .logo-link img{height:20px;max-width:90px}
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <!-- ============================================================
    HEADER - ΜΕΓΑΛΥΤΕΡΑ ΚΟΥΜΠΙΑ
    ============================================================ -->
    <div class="header">
        <button id="toggleOfflineBtn" class="offline-mode" title="Εναλλαγή Offline/Online"><span class="tooltip">Offline/Online</span>📥</button>
        <button id="downloadBtn" class="primary" title="Λήψη offline χάρτη"><span class="tooltip">Λήψη</span>⬇️</button>
        <button id="clearCacheBtn" class="danger" title="Καθαρισμός cache"><span class="tooltip">Cache</span>🗑️</button>
        <button id="statusBtn" style="background:#2c3e50" title="Κατάσταση cache"><span class="tooltip">Κατάσταση</span>📊</button>
        <span class="badge" id="cacheBadge">0</span>
        <button id="locateBtn" class="primary" title="GPS εντοπισμός"><span class="tooltip">GPS</span>📍</button>
        <button id="sosBtn" class="danger" title="SOS έκτακτη ανάγκη"><span class="tooltip">SOS</span>🆘</button>
        <button id="photoBtn" title="Λήψη φωτογραφίας"><span class="tooltip">Φωτό</span>📸</button>
        <button id="routesBtn" class="route-btn" title="Όλες οι διαδρομές"><span class="tooltip">Διαδρομές</span>🗺️</button>
        <span class="badge routes-badge" id="routesBadge">143</span>
        <button id="clearBtn" class="danger" title="Καθαρισμός διαδρομής"><span class="tooltip">Καθαρισμός</span>🗑️</button>
        <button id="saveRouteBtn" class="primary" title="Αποθήκευση διαδρομής"><span class="tooltip">Αποθήκευση</span>💾</button>
        <button id="exportGpxBtn" title="Εξαγωγή GPX"><span class="tooltip">GPX</span>📤</button>
        <button id="reloadMapBtn" title="Επαναφόρτωση χάρτη"><span class="tooltip">Επαναφόρτωση</span>🔄</button>
        <button id="toggleWaypointsBtn" title="Σημεία διαδρομής"><span class="tooltip">Σημεία</span>📍</button>
        <button id="helpBtn" title="Βοήθεια"><span class="tooltip">Βοήθεια</span>❓</button>
        
        <!-- Speed Group - 3 ταχύτητες -->
        <div class="speed-group" title="Ταχύτητα πεζοπορίας">
            <button class="spd-btn" data-speed="3" title="Αργή (3 km/h)">
                <span class="spd-icon">🐢</span>
                <span class="spd-label">Αργή</span>
            </button>
            <button class="spd-btn active" data-speed="4" title="Μέτρια (4 km/h)">
                <span class="spd-icon">🚶</span>
                <span class="spd-label">Μέτρια</span>
            </button>
            <button class="spd-btn" data-speed="5" title="Γρήγορη (5 km/h)">
                <span class="spd-icon">🏃</span>
                <span class="spd-label">Γρήγορη</span>
            </button>
        </div>
        
        <!-- Logo link - δίπλα σε άλλα κουμπιά -->
        <a href="https://agionorosroutes.blogspot.com/" target="_blank" class="logo-link" title="Άγιον Όρος διαδρομές">
            <img src="https://lh3.googleusercontent.com/pw/AP1GczPPmMNFQHezTEW7KFjFuPm3nFmS-waV6gjwBA7x_IyoPvA1bUUI3PlfEJuCfs3IXhaNP_eM-UvlNVywDfU6GCoVESm5WRTuCuq8VxSbVQ8wo88AA3rghIlvzjVnHUsvN5ct-JvkBV4p_qT9LYLQ3Bva=w300-h75-s-no-gm?authuser=2" alt="Athos Maps" loading="lazy">
        </a>
        
        <input type="file" id="fileInput" accept=".gpx" style="display:none">
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
        <input type="file" id="galleryInput" accept="image/*" style="display:none">
    </div>

    <div class="design-indicator" id="designIndicator">✏️ Mode Σχεδίασης</div>

    <div class="status-badge online" id="mapStatus">🌐 Online</div>

    <div id="downloadProgress">
        <span id="progressText">Λήψη...</span>
        <div class="bar"><div class="fill" id="progressFill"></div></div>
    </div>

    <div class="compass-indicator" id="compassIndicator">
        <span class="north-mark">N</span>
        <span id="compassArrow">🧭</span>
    </div>

    <!-- ============================================================
    INFO PANEL - ΜΕΓΑΛΥΤΕΡΑ ΓΡΑΜΜΑΤΑ
    ============================================================ -->
    <div class="info-panel" id="routeInfo">
        <div class="main-info">🥾 <span class="dist" id="dist1">-</span> km · ⏱️ <span class="time-val" id="time1">-</span></div>
        <div class="sub-info">📸 <span id="photoCount">0</span> · <span class="route-name" id="routeNameDisplay">-</span></div>
        <div class="status-line">📍 <span id="statusText">Πατήστε GPS</span></div>
    </div>

    <div id="routeDropdown">
        <div class="dropdown-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                <h3>🗺️ Όλες οι Διαδρομές (<span id="routeListCount">0</span>)</h3>
                <button id="closeRoutesBtn" style="background:#555;color:white;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:12px;">✕</button>
            </div>
            <input type="text" id="routeSearch" class="route-search" placeholder="🔍 Αναζήτηση διαδρομής...">
            <div id="routesList"></div>
            <div class="route-count" id="routeStatus">Φόρτωση...</div>
            <button class="close-routes" id="closeRoutesBtn2">✕ Κλείσιμο</button>
        </div>
    </div>

    <div id="waypointsPanel">
        <div style="display:flex;justify-content:space-between;padding-bottom:3px;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:3px">
            <span style="font-weight:600;color:#4CAF50;font-size:10px">📍 Σημεία (<span id="waypointCount">0</span>)</span>
            <button id="closeWaypointsBtn" style="background:#555;color:white;border:none;border-radius:3px;padding:1px 6px;cursor:pointer;font-size:8px;">✕</button>
        </div>
        <ul id="waypointsList" style="list-style:none;padding:0;margin:0"></ul>
    </div>

    <div id="sosContainer">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;border-bottom:2px solid #e74c3c;padding-bottom:4px">
            <span style="font-size:15px;font-weight:700;color:#e74c3c;">🆘 SOS</span>
            <button id="closeSosBtn" style="background:#555;color:white;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:13px;">✕</button>
        </div>

            BATCH_SIZE: 8,
            MAX_ZOOM: 17
        };

        // ============================================================
        // STATE
        // ============================================================
        const state = {
            map: null,
            tileLayer: null,
            offlineLayer: null,
            isOfflineMode: false,
            isDownloading: false,
            cacheCount: 0,
            db: null,
            userBlueDot: null,
            isLocationTracking: false,
            locationWatchId: null,
            lastKnownPosition: null,
            startPoint: null,
            startName: 'Αφετηρία',
            startMarker: null,
            endPoint: null,
            endName: 'Προορισμός',
            endMarker: null,
            waypoints: [],
            waypointNames: [],
            waypointNotes: [],
            markers: [],
            routeLines: [],
            routePhotos: [],
            photoMarkers: [],
            lastMainGeometry: null,
            lastMainDistance: null,
            lastRouteName: null,
            isDesignMode: false,
            mapRotation: 0,
            isLoadingRoute: false,
            elevationData: null,
            routeCalculated: false
        };

        // ============================================================
        // INDEXEDDB - TILES
        // ============================================================
        function openDB() {
            return new Promise((resolve, reject) => {
                if (state.db) { resolve(state.db); return; }
                const request = indexedDB.open(CONFIG.DB_NAME, CONFIG.DB_VERSION);
                request.onupgradeneeded = (event) => {
                    const d = event.target.result;
                    if (!d.objectStoreNames.contains('tiles')) {
                        const store = d.createObjectStore('tiles', { keyPath: 'key' });
                        store.createIndex('key', 'key', { unique: true });
                        store.createIndex('zoom', 'zoom');
                        store.createIndex('timestamp', 'timestamp');
                    }
                };
                request.onsuccess = (event) => {
                    state.db = event.target.result;
                    resolve(state.db);
                };
                request.onerror = (event) => {
                    reject(event.target.error);
                };
            });
        }

        function getTileFromDB(key) {
            return openDB().then(d => {
                return new Promise((resolve, reject) => {
                    const tx = d.transaction(['tiles'], 'readonly');
                    const store = tx.objectStore('tiles');
                    const request = store.get(key);
                    request.onsuccess = () => resolve(request.result ? request.result.data : null);
                    request.onerror = () => reject(request.error);
                });
            });
        }

        function putTileInDB(key, data, zoom) {
            return openDB().then(d => {
                return new Promise((resolve, reject) => {
                    const tx = d.transaction(['tiles'], 'readwrite');
                    const store = tx.objectStore('tiles');
                    const request = store.put({ key, data, zoom, timestamp: Date.now() });
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            });
        }

        function getAllTilesFromDB() {
            return openDB().then(d => {
                return new Promise((resolve, reject) => {
                    const tx = d.transaction(['tiles'], 'readonly');
                    const store = tx.objectStore('tiles');
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result || []);
                    request.onerror = () => reject(request.error);
                });
            });
        }

        function getTileCountFromDB() {
            return openDB().then(d => {
                return new Promise((resolve, reject) => {
                    const tx = d.transaction(['tiles'], 'readonly');
                    const store = tx.objectStore('tiles');
                    const request = store.count();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            });
        }

        function clearTilesDB() {
            return openDB().then(d => {
                return new Promise((resolve, reject) => {
                    const tx = d.transaction(['tiles'], 'readwrite');
                    const store = tx.objectStore('tiles');
                    const request = store.clear();
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            });
        }

        async function getDBSize() {
            const tiles = await getAllTilesFromDB();
            let size = 0;
            for (const tile of tiles) {
                if (tile.data) size += tile.data.length * 0.75;
            }
            return size;
        }

        // ============================================================
        // OFFLINE TILE LAYER
        // ============================================================
        function createOfflineTileLayer() {
            const layer = L.tileLayer('', {
                maxZoom: CONFIG.MAX_ZOOM,
                minZoom: 8,
                bounds: [CONFIG.ATHOS_BOUNDS.southWest, CONFIG.ATHOS_BOUNDS.northEast],
                crossOrigin: true,
                keepBuffer: 1
            });

            layer.createTile = function(coords, done) {
                const tile = document.createElement('img');
                const url = `https://tile.openstreetmap.org/${coords.z}/${coords.x}/${coords.y}.png`;
                const tileKey = `osm_${coords.z}_${coords.x}_${coords.y}`;
                
                getTileFromDB(tileKey).then(data => {
                    if (data) {
                        tile.src = data;
                        tile.onload = () => done(null, tile);
                        tile.onerror = () => {
                            tile.src = url;
                            done(null, tile);
                        };
                    } else if (navigator.onLine && isOnlineAccessGranted) {
                        tile.src = url;
                        tile.onload = () => {
                            fetch(url).then(resp => {
                                if (resp.ok) {
                                    resp.blob().then(blob => {
                                        const reader = new FileReader();
                                        reader.onload = function(e) {
                                            putTileInDB(tileKey, e.target.result, coords.z);
                                        };
                                        reader.readAsDataURL(blob);
                                    });
                                }
                            }).catch(() => {});
                            done(null, tile);
                        };
                        tile.onerror = () => done(new Error('Tile not available'), null);
                    } else {
                        done(new Error('Tile not available'), null);
                    }
                }).catch(() => {
                    if (navigator.onLine && isOnlineAccessGranted) {
                        tile.src = url;
                        done(null, tile);
                    } else {
                        done(new Error('Tile not available'), null);
                    }
                });

                return tile;
            };

            return layer;
        }

        // ============================================================
        // DOWNLOAD TILES
        // ============================================================
        function getTilesForBounds(bounds, zoom) {
            const tiles = [];
            const [minLat, minLng] = bounds.southWest;
            const [maxLat, maxLng] = bounds.northEast;
            
            const minX = Math.floor((minLng + 180) / 360 * Math.pow(2, zoom));
            const maxX = Math.floor((maxLng + 180) / 360 * Math.pow(2, zoom));
            const minY = Math.floor((1 - Math.log(Math.tan(minLat * Math.PI / 180) + 1 / Math.cos(minLat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, zoom));
            const maxY = Math.floor((1 - Math.log(Math.tan(maxLat * Math.PI / 180) + 1 / Math.cos(maxLat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, zoom));
            
            for (let x = minX; x <= maxX; x++) {
                for (let y = minY; y <= maxY; y++) {
                    tiles.push({ x, y });
                }
            }
            return tiles;
        }

        async function downloadOfflineMap() {
            if (state.isDownloading) {
                showToast('⏳ Ήδη σε εξέλιξη...', '#f39c12');
                return;
            }

            const existing = await getTileCountFromDB();
            if (existing > 100) {
                if (!confirm(`🔄 Υπάρχουν ήδη ${existing} tiles. Θέλεις να ξανακατεβάσεις;`)) {
                    return;
                }
                await clearTilesDB();
            }

            state.isDownloading = true;
            const btn = document.getElementById('downloadBtn');
            btn.textContent = '⏳';
            btn.className = 'warning';
            
            const progressDiv = document.getElementById('downloadProgress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            progressDiv.style.display = 'block';

            try {
                const zoomLevels = CONFIG.ZOOM_LEVELS;
                let totalTiles = 0;
                const tileMap = new Map();
                
                for (const z of zoomLevels) {
                    const tiles = getTilesForBounds(CONFIG.ATHOS_BOUNDS, z);
                    totalTiles += tiles.length;
                    tileMap.set(z, tiles);
                }

                let loadedTiles = 0;
                const existingTiles = new Set();

                for (const [z, tiles] of tileMap) {
                    for (const tile of tiles) {
                        const key = `osm_${z}_${tile.x}_${tile.y}`;
                        const data = await getTileFromDB(key);
                        if (data) {
                            existingTiles.add(key);
                            loadedTiles++;
                        }
                    }
                }

                const tilesToDownload = totalTiles - existingTiles.size;
                if (tilesToDownload === 0) {
                    progressText.textContent = '✅ Όλα τα tiles υπάρχουν!';
                    setTimeout(() => { progressDiv.style.display = 'none'; }, 2000);
                    showToast(`✅ ${totalTiles} tiles έτοιμα!`, '#2c5f2d');
                    state.isDownloading = false;
                    btn.textContent = '⬇️';
                    btn.className = 'primary';
                    updateCacheInfo();
                    return;
                }

                progressText.textContent = `Λήψη ${tilesToDownload} tiles...`;

                for (const [z, tiles] of tileMap) {
                    const batchSize = CONFIG.BATCH_SIZE;
                    let batch = [];
                    
                    for (const tile of tiles) {
                        const key = `osm_${z}_${tile.x}_${tile.y}`;
                        if (existingTiles.has(key)) continue;
                        
                        batch.push({ z, x: tile.x, y: tile.y, key });
                        
                        if (batch.length >= batchSize) {
                            await downloadBatch(batch, progressText, progressFill, loadedTiles, totalTiles);
                            loadedTiles += batch.length;
                            batch = [];
                        }
                    }
                    
                    if (batch.length > 0) {
                        await downloadBatch(batch, progressText, progressFill, loadedTiles, totalTiles);
                        loadedTiles += batch.length;
                    }
                }

                const finalCount = await getTileCountFromDB();
                progressText.textContent = `✅ Ολοκληρώθηκε! ${finalCount} tiles`;
                setTimeout(() => { progressDiv.style.display = 'none'; }, 3000);
                
                showToast(`✅ Λήψη ολοκληρώθηκε! ${finalCount} tiles`, '#2c5f2d');
                updateCacheInfo();
                enableOfflineMode();
                
            } catch (error) {
                console.error('Download error:', error);
                showToast(`❌ Σφάλμα: ${error.message}`, '#e74c3c');
                progressDiv.style.display = 'none';
            }

            state.isDownloading = false;
            btn.textContent = '⬇️';
            btn.className = 'primary';
        }

        async function downloadBatch(batch, progressText, progressFill, loadedTiles, totalTiles) {
            const promises = batch.map(async ({ z, x, y, key }) => {
                try {
                    const existing = await getTileFromDB(key);
                    if (existing) return;
                    
                    const url = `https://tile.openstreetmap.org/${z}/${x}/${y}.png`;
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const blob = await response.blob();
                    const reader = new FileReader();
                    return new Promise((resolve) => {
                        reader.onload = async function(e) {
                            await putTileInDB(key, e.target.result, z);
                            resolve();
                        };
                        reader.readAsDataURL(blob);
                    });
                } catch (err) {
                    console.warn(`Tile ${key} failed:`, err);
                    return;
                }
            });

            await Promise.allSettled(promises);
            
            const currentTotal = await getTileCountFromDB();
            const pct = Math.min(100, Math.round((currentTotal / totalTiles) * 100));
            progressFill.style.width = pct + '%';
            progressText.textContent = `Λήψη... ${pct}% (${currentTotal}/${totalTiles})`;
        }

        // ============================================================
        // OFFLINE MODE
        // ============================================================
        async function enableOfflineMode() {
            const count = await getTileCountFromDB();
            if (count === 0) {
                showToast('❌ Δεν υπάρχουν offline tiles', '#e74c3c');
                return false;
            }

            if (state.tileLayer && state.map.hasLayer(state.tileLayer)) {
                state.map.removeLayer(state.tileLayer);
            }
            if (state.offlineLayer && state.map.hasLayer(state.offlineLayer)) {
                state.map.removeLayer(state.offlineLayer);
            }

            state.offlineLayer = createOfflineTileLayer();
            state.map.addLayer(state.offlineLayer);
            state.isOfflineMode = true;

            document.getElementById('mapStatus').textContent = `📥 Offline (${count})`;
            document.getElementById('mapStatus').className = 'status-badge offline';
            document.getElementById('toggleOfflineBtn').textContent = '📥✓';
            document.getElementById('toggleOfflineBtn').className = 'offline-mode active';
            
            const bounds = L.latLngBounds([
                [CONFIG.ATHOS_BOUNDS.southWest[0] - 0.01, CONFIG.ATHOS_BOUNDS.southWest[1] - 0.01],
                [CONFIG.ATHOS_BOUNDS.northEast[0] + 0.01, CONFIG.ATHOS_BOUNDS.northEast[1] + 0.01]
            ]);
            
            const zoom = state.map.getBoundsZoom(bounds);
            state.map.setView([40.20, 24.25], Math.min(zoom, 13));
            state.map.setMinZoom(9);
            
            showToast(`📥 Offline mode - ${count} tiles`, '#2980b9');
            return true;
        }

        function disableOfflineMode() {
            if (state.offlineLayer && state.map.hasLayer(state.offlineLayer)) {
                state.map.removeLayer(state.offlineLayer);
                state.offlineLayer = null;
            }
            
            state.map.setMinZoom(3);
            
            if (!state.tileLayer) {
                state.tileLayer = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    crossOrigin: true
                });
            }
            if (!state.map.hasLayer(state.tileLayer)) {
                state.map.addLayer(state.tileLayer);
            }
            
            state.isOfflineMode = false;
            document.getElementById('mapStatus').textContent = '🌐 Online';
            document.getElementById('mapStatus').className = 'status-badge online';
            document.getElementById('toggleOfflineBtn').textContent = '📥';
            document.getElementById('toggleOfflineBtn').className = 'offline-mode';
            
            showToast('🌐 Online mode', '#2c5f2d');
        }

        // ============================================================
        // CACHE INFO
        // ============================================================
        async function updateCacheInfo() {
            const count = await getTileCountFromDB();
            const size = await getDBSize();
            state.cacheCount = count;
            const badge = document.getElementById('cacheBadge');
            badge.textContent = count > 0 ? count : '0';

        // ============================================================
        // ROUTES - ΦΟΡΤΩΣΗ ΑΠΟ GITHUB
        // ============================================================
        function loadRouteFromGitHub(url, name) {
            if (state.isLoadingRoute) {
                showToast('⏳ Φόρτωση σε εξέλιξη...', '#f39c12');
                return;
            }
            
            state.isLoadingRoute = true;
            showToast(`⏳ Φόρτωση: ${name}...`, '#8e44ad');
            
            fetch(url, { 
                headers: { 'Accept': 'application/gpx+xml,application/xml,text/xml,*/*' } 
            })
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.text();
            })
            .then(text => {
                if (!text.includes('<gpx')) throw new Error('Δεν είναι GPX');
                const data = parseGPX(text);
                if (data.tracks.length === 0) throw new Error('Δεν βρέθηκαν διαδρομές');
                
                state.routeLines.forEach(l => state.map.removeLayer(l));
                state.routeLines = [];
                
                let totalDist = 0;
                const allCoords = [];
                data.tracks.forEach((coords, idx) => {
                    if (coords.length < 2) return;
                    // 🔴 ΚΟΚΚΙΝΗ ΔΙΑΔΡΟΜΗ
                    const line = L.polyline(coords, { 
                        color: '#e74c3c', 
                        weight: 4, 
                        opacity: 0.9,
                        smoothFactor: 1
                    }).addTo(state.map);
                    state.routeLines.push(line);
                    const d = computeDistance(coords.map(c => [c[1], c[0]]));
                    totalDist += d;
                    coords.forEach(c => allCoords.push(c));
                });
                
                if (allCoords.length > 1) {
                    state.lastMainGeometry = allCoords.map(c => [c[1], c[0]]);
                    state.lastMainDistance = totalDist;
                    state.lastRouteName = name;
                    state.routeCalculated = true;
                    
                    document.getElementById('dist1').textContent = totalDist.toFixed(2);
                    updateTimeDisplay();
                    document.getElementById('routeNameDisplay').textContent = name;
                    
                    state.map.fitBounds(L.latLngBounds(allCoords), { padding: [50, 50] });
                    updateInfo();
                    saveLastRouteState();
                    showToast(`✅ Φορτώθηκε: ${name} (${totalDist.toFixed(1)}km)`, '#2c5f2d');
                }
                state.isLoadingRoute = false;
            })
            .catch(err => {
                showToast(`❌ Σφάλμα: ${err.message}`, '#e74c3c');
                state.isLoadingRoute = false;
            });
        }

        function parseGPX(xmlText) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(xmlText, 'text/xml');
            if (xml.querySelector('parsererror')) throw new Error('Μη έγκυρο GPX');
            
            const result = { tracks: [], waypoints: [] };
            
            const trks = xml.querySelectorAll('trk');
            trks.forEach(trk => {
                const segs = trk.querySelectorAll('trkseg');
                segs.forEach(seg => {
                    const pts = seg.querySelectorAll('trkpt');
                    const coords = [];
                    pts.forEach(pt => {
                        const lat = parseFloat(pt.getAttribute('lat'));
                        const lon = parseFloat(pt.getAttribute('lon'));
                        if (!isNaN(lat) && !isNaN(lon)) {
                            coords.push([lat, lon]);
                        }
                    });
                    if (coords.length > 1) {
                        result.tracks.push(coords);
                    }
                });
            });
            
            const wpts = xml.querySelectorAll('wpt');
            wpts.forEach(wpt => {
                const lat = parseFloat(wpt.getAttribute('lat'));
                const lon = parseFloat(wpt.getAttribute('lon'));
                if (!isNaN(lat) && !isNaN(lon)) {
                    const nameEl = wpt.querySelector('name');
                    result.waypoints.push({
                        lat, lon,
                        name: nameEl ? nameEl.textContent.trim() : ''
                    });
                }
            });
            
            return result;
        }

        // ============================================================
        // ROUTES UI - ΑΛΦΑΒΗΤΙΚΗ ΣΕΙΡΑ
        // ============================================================
        function showRouteDropdown() {
            document.getElementById('routeDropdown').classList.add('active');
            renderRoutesList('');
        }

        function hideRouteDropdown() {
            document.getElementById('routeDropdown').classList.remove('active');
        }

        function renderRoutesList(filter) {
            const list = document.getElementById('routesList');
            const count = document.getElementById('routeListCount');
            
            let filtered = ROUTES;
            if (filter && filter.trim()) {
                const f = filter.toLowerCase().trim();
                filtered = ROUTES.filter(r => 
                    r.name.toLowerCase().includes(f) || 
                    r.start.toLowerCase().includes(f) || 
                    r.end.toLowerCase().includes(f)
                );
            }
            
            count.textContent = filtered.length;
            
            if (filtered.length === 0) {
                list.innerHTML = '<div style="color:#888;padding:10px;text-align:center;">📭 Δεν βρέθηκαν διαδρομές</div>';
                return;
            }
            
            let html = '';
            let currentLetter = '';
            
            filtered.forEach((route, idx) => {
                const firstLetter = route.name.charAt(0).toUpperCase();
                if (firstLetter !== currentLetter) {
                    currentLetter = firstLetter;
                    html += `<div class="letter-header">${currentLetter}</div>`;
                }
                
                html += `
                    <div class="route-item" data-index="${idx}">
                        <div class="route-name">
                            ${route.name}
                            <div class="start-end">${route.start} → ${route.end}</div>
                        </div>
                        <button class="load-route-btn" data-url="${route.url}" data-name="${route.name}">📂</button>
                    </div>
                `;
            });
            
            list.innerHTML = html;
            
            list.querySelectorAll('.load-route-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const url = this.dataset.url;
                    const name = this.dataset.name;
                    loadRouteFromGitHub(url, name);
                    hideRouteDropdown();
                });
            });
            
            list.querySelectorAll('.route-item').forEach(item => {
                item.addEventListener('click', function() {
                    const btn = this.querySelector('.load-route-btn');
                    if (btn) btn.click();
                });
            });
        }

        // ============================================================
        // SPEED GROUP - 3 ΤΑΧΥΤΗΤΕΣ
        // ============================================================
        function setupSpeedGroup() {
            const buttons = document.querySelectorAll('.spd-btn');
            
            buttons.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const speed = parseInt(this.dataset.speed);
                    if (speed && SPEED_PRESETS[speed]) {
                        currentSpeed = speed;
                        buttons.forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        updateTimeDisplay();
                        updateInfo();
                        showToast(`⏱️ Ταχύτητα: ${SPEED_PRESETS[speed].label} (${speed} km/h)`, '#4CAF50');
                    }
                });
            });
        }

        function updateTimeDisplay() {
            if (state.lastMainDistance !== null && state.lastMainDistance > 0) {
                const hours = state.lastMainDistance / currentSpeed;
                document.getElementById('time1').textContent = formatTime(hours);
            } else {
                document.getElementById('time1').textContent = '-';
            }
        }

        // ============================================================
        // GPX EXPORT
        // ============================================================
        function performGpxExport() {
            if (!state.lastMainGeometry) {
                showToast('❌ Δεν υπάρχει διαδρομή', '#e74c3c');
                return;
            }
            
            const code = prompt('Εισαγάγετε τον κωδικό πρόσβασης για εξαγωγή GPX:');
            
            if (code !== ACCESS_CODE) {
                showToast('❌ Λάθος κωδικός', '#e74c3c');
                return;
            }
            
            const name = prompt('Όνομα αρχείου:', 'athos_route') || 'athos_route';
            
            let gpx = '<?xml version="1.0" encoding="UTF-8"?>\n';
            gpx += '<gpx version="1.1" creator="Athos Maps">\n';
            gpx += `  <trk>\n    <name>${name}</name>\n    <trkseg>\n`;
            
            for (const c of state.lastMainGeometry) {
                gpx += `      <trkpt lat="${c[1]}" lon="${c[0]}"></trkpt>\n`;
            }
            
            gpx += '    </trkseg>\n  </trk>\n</gpx>';
            
            const blob = new Blob([gpx], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${name}.gpx`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('✅ GPX εξήχθη', '#1a7a3a');
        }

        // ============================================================
        // HELPERS
        // ============================================================
        function showToast(msg, color = 'rgba(0,0,0,0.85)') {
            const t = document.createElement('div');
            t.style.cssText = `position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:${color};color:white;padding:6px 14px;border-radius:10px;z-index:9999;font-size:11px;text-align:center;max-width:90%;pointer-events:none;font-weight:600`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function getColorIcon(color) {
            return L.icon({
                iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png`,
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.3.1/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowSize: [41, 41]
            });
        }

        function formatTime(hours) {
            if (hours === null || isNaN(hours) || hours < 0) return '-';
            const minutes = Math.round(hours * 60);
            const hh = Math.floor(minutes / 60);
            const mm = minutes % 60;
            if (hh === 0 && mm === 0) return '<1 λεπτό';
            if (hh === 0) return `${mm} λεπτά`;
            if (mm === 0) return `${hh} ώρα${hh !== 1 ? 'ες' : ''}`;
            return `${hh} ώρα${hh !== 1 ? 'ες' : ''} ${mm} λεπτά`;
        }

        function computeDistance(coords) {
            if (!coords || coords.length < 2) return 0;
            let dist = 0;
            for (let i = 1; i < coords.length; i++) {
                dist += L.latLng(coords[i-1][1], coords[i-1][0])
                    .distanceTo(L.latLng(coords[i][1], coords[i][0]));
            }
            return dist / 1000;
        }

        function makeDraggable(el) {
            if (!el) return;
            let isDragging = false, startX = 0, startY = 0, offsetX = 0, offsetY = 0;
            
            function onStart(e) {
                if (e.target.closest('button,input,select')) return;
                const touch = e.touches ? e.touches[0] : e;
                isDragging = true;
                startX = touch.clientX;
                startY = touch.clientY;
                const rect = el.getBoundingClientRect();
                offsetX = startX - rect.left;
                offsetY = startY - rect.top;
                el.style.position = 'fixed';
                el.style.left = rect.left + 'px';
                el.style.top = rect.top + 'px';
                el.style.bottom = 'auto';
                el.style.right = 'auto';
                el.style.transform = 'none';
                el.style.cursor = 'grabbing';
                el.style.zIndex = '9999';
                e.preventDefault();
            }
            
            function onMove(e) {
                if (!isDragging) return;
                const touch = e.touches ? e.touches[0] : e;
                let left = touch.clientX - offsetX;
                let top = touch.clientY - offsetY;
                const rect = el.getBoundingClientRect();
                left = Math.max(10, Math.min(window.innerWidth - rect.width - 10, left));
                top = Math.max(10, Math.min(window.innerHeight - rect.height - 10, top));
                el.style.left = left + 'px';
                el.style.top = top + 'px';
                e.preventDefault();
            }
            
            function onEnd(e) {
                if (!isDragging) return;
                isDragging = false;
                el.style.cursor = '';
                el.style.zIndex = '';
                e.preventDefault();
            }
            
            el.addEventListener('mousedown', onStart);
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);
            el.addEventListener('touchstart', onStart, { passive: false });
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onEnd, { passive: false });
        }

        // ============================================================
        // GPS
        // ============================================================
        function locateUser() {
            if (state.isLocationTracking) {
                stopLocationTracking();
                return;
            }
            
            if (navigator.geolocation) {
                document.getElementById('locateBtn').textContent = '📍✓';
                document.getElementById('locateBtn').className = 'primary active';
                state.isLocationTracking = true;
                
                state.locationWatchId = navigator.geolocation.watchPosition(
                    function(pos) {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        state.lastKnownPosition = { lat, lng };
                        
                        if (!state.userBlueDot) {
                            state.userBlueDot = L.marker([lat, lng], {
                                icon: L.divIcon({
                                    html: '<div class="blue-dot"><div class="blue-dot-glow"></div></div>',
                                    className: '',
                                    iconSize: [14, 14],
                                    iconAnchor: [7, 7]
                                }),
                                zIndexOffset: 1000
                            }).addTo(state.map);
                        } else {
                            state.userBlueDot.setLatLng([lat, lng]);
                        }
                        document.getElementById('statusText').textContent = `📍 ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                        state.map.flyTo([lat, lng], 15);
                    },
                    function() {
                        stopLocationTracking();
                        showToast('❌ GPS απέτυχε', '#e74c3c');
                    },
                    { enableHighAccuracy: true, timeout: 15000 }
                );
            } else {
                showToast('⚠️ GPS μη διαθέσιμο', '#e67e22');
            }
        }

        function stopLocationTracking() {
            if (state.locationWatchId) {
                navigator.geolocation.clearWatch(state.locationWatchId);
                state.locationWatchId = null;
            }
            state.isLocationTracking = false;
            document.getElementById('locateBtn').textContent = '📍';
            document.getElementById('locateBtn').className = 'primary';
            document.getElementById('statusText').textContent = 'Πατήστε GPS';

            state.waypointNotes.splice(idx, 1);
