        // ============================================================
        //  ΦΟΡΤΩΣΗ GPX / KML
        // ============================================================
        document.getElementById('fileInput').addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (!file) return;

            var reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(ev.target.result, 'text/xml');
                    if (doc.getElementsByTagName('parsererror').length > 0) throw new Error('Λάθος XML');

                    var geojson;
                    var root = doc.documentElement;
                    if (root.tagName.toLowerCase() === 'gpx') {
                        geojson = toGeoJSON.gpx(doc);
                    } else if (root.tagName.toLowerCase() === 'kml' || root.getAttribute('xmlns')?.includes('kml')) {
                        geojson = toGeoJSON.kml(doc);
                    } else {
                        throw new Error('Μη αναγνωρίσιμος τύπος');
                    }

                    clearAll();

                    var geometry = null;
                    if (geojson.features) {
                        for (var i = 0; i < geojson.features.length; i++) {
                            var feat = geojson.features[i];
                            if (feat.geometry && (feat.geometry.type === 'LineString' || feat.geometry.type === 'MultiLineString')) {
                                if (feat.geometry.type === 'LineString') {
                                    geometry = feat.geometry.coordinates;
                                    break;
                                } else if (feat.geometry.type === 'MultiLineString') {
                                    geometry = feat.geometry.coordinates.flat();
                                    break;
                                }
                            }
                        }
                    }
                    
                    if (geometry && geometry.length > 0) {
                        lastMainGeometry = geometry;
                        lastMainDistance = computeDistanceFromCoords(geometry);
                        
                        var latlngs = geometry.map(function(c) { return [c[1], c[0]]; });
                        var line = L.polyline(latlngs, { color: '#2c5f2d', weight: 5, opacity: 0.8 }).addTo(map);
                        routeLines.push(line);
                        map.fitBounds(line.getBounds(), { padding: [40,40] });
                        
                        if (geojson.features) {
                            var points = geojson.features.filter(function(f) { return f.geometry.type === 'Point'; });
                            for (var j = 0; j < points.length; j++) {
                                var f = points[j];
                                var coords = f.geometry.coordinates;
                                var name = f.properties?.name || '';
                                if (f.properties?.sym === 'Start') {
                                    startPoint = { lat: coords[1], lng: coords[0] };
                                    startName = name || 'Αφετηρία';
                                    if (startMarker) map.removeLayer(startMarker);
                                    startMarker = L.marker([coords[1], coords[0]], { icon: getColorIcon('green') })
                                        .addTo(map).bindPopup('🚩 ' + startName);
                                } else if (f.properties?.sym === 'End') {
                                    endPoint = { lat: coords[1], lng: coords[0] };
                                    endName = name || 'Προορισμός';
                                    if (endMarker) map.removeLayer(endMarker);
                                    endMarker = L.marker([coords[1], coords[0]], { icon: getColorIcon('red') })
                                        .addTo(map).bindPopup('🏁 ' + endName);
                                } else if (f.properties?.sym === 'Waypoint' || f.properties?.sym === 'Flag') {
                                    waypoints.push({ lat: coords[1], lng: coords[0] });
                                    waypointNames.push(name || 'Σημείο');
                                    var marker = L.marker([coords[1], coords[0]], { icon: getColorIcon('blue') })
                                        .addTo(map).bindPopup('📍 ' + (name || 'Σημείο'));
                                    markers.push(marker);
                                }
                            }
                        }
                        
                        updateInfo();
                        alert('✅ Φορτώθηκε!');
                    } else {
                        alert('Το αρχείο δεν περιέχει διαδρομή.');
                    }
                } catch (err) {
                    alert('Σφάλμα: ' + err.message);
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        });

        // ============================================================
        //  ΥΠΟΛΟΓΙΣΜΟΣ ΔΙΑΔΡΟΜΗΣ
        // ============================================================
        async function calculateRoute() {
            if (!startPoint || !endPoint) return;
            
            var allPoints = [startPoint].concat(waypoints).concat([endPoint]);
            for (var i = 0; i < routeLines.length; i++) { map.removeLayer(routeLines[i]); }
            routeLines = [];
            
            try {
                var coordinates = allPoints.map(function(p) { return [p.lng, p.lat]; });
                var response = await fetch('https://api.openrouteservice.org/v2/directions/foot-hiking', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': ORS_API_KEY
                    },
                    body: JSON.stringify({
                        coordinates: coordinates,
                        preference: 'recommended',
                        units: 'km',
                        geometry: true,
                        geometry_format: 'geojson'
                    })
                });
                
                if (!response.ok) throw new Error('ORS error');
                var data = await response.json();
                
                var feature = data.features?.[0];
                if (!feature) throw new Error('No route');
                
                var coords = feature.geometry.coordinates;
                lastMainGeometry = coords;
                lastMainDistance = (feature.properties?.summary?.distance || 0) / 1000;
                
                var latlngs = coords.map(function(c) { return [c[1], c[0]]; });
                var line = L.polyline(latlngs, { color: '#2c5f2d', weight: 5, opacity: 0.8 }).addTo(map);
                routeLines.push(line);
                map.fitBounds(line.getBounds(), { padding: [40,40] });
                
                updateInfo();
                document.getElementById('osmLink').href = 'https://www.openstreetmap.org/directions?engine=foot&route=' + allPoints.map(function(p) { return p.lat + ',' + p.lng; }).join(';');
                
            } catch (err) {
                console.error('Route error:', err);
                try {
                    await calculateRouteGraphHopper(allPoints);
                } catch (e) {
                    alert('Αποτυχία υπολογισμού');
                }
            }
        }

        async function calculateRouteGraphHopper(allPoints) {
            var url = 'https://graphhopper.com/api/1/route?key=' + GRAPHHOPPER_API_KEY + '&profile=foot&points_encoded=false&calc_points=true';
            allPoints.forEach(function(p) { url += '&point=' + p.lat + ',' + p.lng; });
            
            var response = await fetch(url);
            var data = await response.json();
            if (data.paths && data.paths[0]) {
                var coords = data.paths[0].points.coordinates;
                lastMainGeometry = coords;
                lastMainDistance = data.paths[0].distance / 1000;
                
                var latlngs = coords.map(function(c) { return [c[1], c[0]]; });
                var line = L.polyline(latlngs, { color: '#2c5f2d', weight: 5, opacity: 0.8 }).addTo(map);
                routeLines.push(line);
                map.fitBounds(line.getBounds(), { padding: [40,40] });
                updateInfo();
            }
        }

        // ============================================================
        //  ΠΛΟΗΓΗΣΗ - ΛΕΙΤΟΥΡΓΕΙ ΚΑΙ ΜΕ ΚΑΤΑΓΕΓΡΑΜΜΕΝΕΣ ΔΙΑΔΡΟΜΕΣ
        // ============================================================
        function toggleNavigation() {
            if (isNavigating) { 
                closeNavigation(); 
                return; 
            }
            
            if (!lastMainGeometry || lastMainGeometry.length < 2) {
                if (recordedLine && recordedPoints.length > 1) {
                    var geometry = recordedPoints.map(function(p) { return [p.lng, p.lat]; });
                    lastMainGeometry = geometry;
                    lastMainDistance = computeDistanceFromCoords(geometry);
                } else {
                    alert('Δεν υπάρχει διαδρομή για πλοήγηση.\n\n' +
                          'Δημιουργήστε μια διαδρομή με:\n' +
                          '• Σχεδίαση (Start → End)\n' +
                          '• Φόρτωση GPX/KML\n' +
                          '• Καταγραφή (⏺️ Καταγραφή)');
                    return;
                }
            }
            
            startNavigation();
        }

        function startNavigation() {
            isNavigating = true;
            isMinimized = false;
            
            document.getElementById('navigationPanel').classList.add('active');
            document.getElementById('floatingPhotoBtn').classList.add('active');
            document.getElementById('miniNavBar').classList.remove('active');
            document.getElementById('navBtn').innerHTML = '🛑';
            document.getElementById('bottomNavBtn').innerHTML = '🛑';
            
            var geometryToUse = lastMainGeometry;
            
            if (!geometryToUse && recordedLine && recordedPoints.length > 1) {
                geometryToUse = recordedPoints.map(function(p) { return [p.lng, p.lat]; });
                lastMainGeometry = geometryToUse;
                lastMainDistance = computeDistanceFromCoords(geometryToUse);
            }
            
            if (!geometryToUse || geometryToUse.length < 2) {
                alert('Δεν υπάρχει έγκυρη διαδρομή για πλοήγηση.');
                closeNavigation();
                return;
            }
            
            generateSteps(geometryToUse);
            
            if (!userPositionMarker) {
                var userIcon = L.divIcon({
                    className: 'user-marker',
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                });
                userPositionMarker = L.marker([0, 0], { icon: userIcon }).addTo(map);
            }
            
            if (navigator.geolocation) {
                if (navigationWatchId) {
                    navigator.geolocation.clearWatch(navigationWatchId);
                    navigationWatchId = null;
                }
                
                navigationWatchId = navigator.geolocation.watchPosition(
                    function(pos) {
                        var lat = pos.coords.latitude;
                        var lng = pos.coords.longitude;
                        
                        if (userPositionMarker) {
                            userPositionMarker.setLatLng([lat, lng]);
                        }
                        
                        map.panTo([lat, lng]);
                        
                        updateNavigationPosition({
                            latlng: L.latLng(lat, lng)
                        });
                    },
                    function(err) {
                        console.warn('Navigation watch error:', err.message);
                    },
                    { 
                        enableHighAccuracy: true, 
                        timeout: 15000,
                        maximumAge: 5000
                    }
                );
            }
        }

        function closeNavigation() {
            isNavigating = false;
            document.getElementById('navigationPanel').classList.remove('active');
            document.getElementById('floatingPhotoBtn').classList.remove('active');
            document.getElementById('miniNavBar').classList.remove('active');
            document.getElementById('navBtn').innerHTML = '🧭';
            document.getElementById('bottomNavBtn').innerHTML = '🧭';
            
            if (navigationWatchId) {
                navigator.geolocation.clearWatch(navigationWatchId);
                navigationWatchId = null;
            }
            
            if (userPositionMarker) {
                map.removeLayer(userPositionMarker);
                userPositionMarker = null;
            }
            
            var statusEl = document.getElementById('statusText');
            if (statusEl) {
                statusEl.innerHTML = 'Πλοήγηση τερματίστηκε';
                setTimeout(function() { statusEl.innerHTML = 'Πατήστε "Θέση μου"'; }, 2000);
            }
        }

        function minimizeNavigation() {
            if (!isNavigating) return;
            isMinimized = true;
            document.getElementById('navigationPanel').classList.remove('active');
            document.getElementById('miniNavBar').classList.add('active');
            updateMiniBar();
        }

        function expandNavigation() {
            if (!isNavigating) return;
            isMinimized = false;
            document.getElementById('navigationPanel').classList.add('active');
            document.getElementById('miniNavBar').classList.remove('active');
        }

        function updateMiniBar() {
            var miniDist = document.getElementById('miniDistance');
            var miniFill = document.getElementById('miniProgressFill');
            
            if (navigationSteps.length > 0) {
                var closest = 0;
                var minDist = Infinity;
                
                if (userPositionMarker) {
                    var userPos = userPositionMarker.getLatLng();
                    for (var i = 0; i < navigationSteps.length; i++) {
                        var dist = userPos.distanceTo(navigationSteps[i].latlng);
                        if (dist < minDist) { minDist = dist; closest = i; }
                    }
                }
                
                var remaining = navigationSteps[navigationSteps.length - 1].distance - navigationSteps[closest].distance;
                var remainingText = remaining < 1 ? 
                    Math.round(remaining * 1000) + 'μ' : 
                    remaining.toFixed(1) + ' χλμ';
                miniDist.textContent = '🚶 ' + remainingText;
                
                var progress = (closest / (navigationSteps.length - 1)) * 100;
                miniFill.style.width = Math.min(100, progress) + '%';
            }
        }

        function generateSteps(geometry) {
            var coords = geometry || lastMainGeometry;
            if (!coords || coords.length < 2) {
                alert('Δεν υπάρχει έγκυρη διαδρομή.');
                return;
            }
            
            var steps = [];
            var total = coords.length;
            var stepSize = Math.max(1, Math.floor(total / 10));
            
            for (var i = 0; i < total; i += stepSize) {
                var c = coords[i];
                var isStart = i === 0;
                var isEnd = i >= total - stepSize;
                var instruction = isStart ? '🚩 Αφετηρία' : isEnd ? '🏁 Προορισμός' : '🚶 Συνεχίστε';
                
                var latlng = L.latLng(c[1], c[0]);
                for (var j = 0; j < waypoints.length; j++) {
                    if (latlng.distanceTo(L.latLng(waypoints[j].lat, waypoints[j].lng)) < 150) {
                        instruction = '📍 ' + waypointNames[j];
                    }
                }
                
                var totalDist = 0;
                for (var k = 0; k < i; k++) {
                    var p1 = coords[k];
                    var p2 = coords[Math.min(k + 1, total - 1)];
                    totalDist += L.latLng(p1[1], p1[0]).distanceTo(L.latLng(p2[1], p2[0]));
                }
                
                steps.push({
                    latlng: latlng,
                    instruction: instruction,
                    distance: totalDist / 1000
                });
            }
            
            navigationSteps = steps;
            displaySteps(steps);
        }

        function displaySteps(steps) {
            var container = document.getElementById('navSteps');
            var html = '';
            for (var i = 0; i < steps.length; i++) {
                var step = steps[i];
                html += '<div class="nav-step ' + (i === 0 ? 'active' : '') + '" data-index="' + i + '"><div class="nav-step-icon">' + (step.instruction.split(' ')[0] || '➡️') + '</div><div class="nav-step-content"><div class="instruction">' + step.instruction + '</div><div class="distance">' + step.distance.toFixed(1) + ' km</div></div></div>';
            }
            container.innerHTML = html;
        }

        function updateNavigationPosition(e) {
            if (!isNavigating) return;
            
            var userPos = e.latlng;
            var minDist = Infinity;
            var closest = 0;
            
            for (var i = 0; i < navigationSteps.length; i++) {
                var dist = userPos.distanceTo(navigationSteps[i].latlng);
                if (dist < minDist) { 
                    minDist = dist; 
                    closest = i; 
                }
            }
            
            var stepElements = document.querySelectorAll('.nav-step');
            stepElements.forEach(function(el, idx) {
                el.classList.toggle('active', idx === closest);
            });
            
            var progress = (closest / (navigationSteps.length - 1)) * 100;
            document.getElementById('navProgressBar').style.width = Math.min(100, progress) + '%';
            
            if (isMinimized) {
                updateMiniBar();
            }
            
            var statusEl = document.getElementById('statusText');
            if (statusEl && navigationSteps.length > 0) {
                var remaining = navigationSteps[navigationSteps.length - 1].distance - navigationSteps[closest].distance;
                if (remaining < 0.1) {
                    statusEl.innerHTML = '🏁 Φτάσατε!';
                } else {
                    var remainingText = remaining < 1 ? 
                        Math.round(remaining * 1000) + ' μέτρα' : 
                        remaining.toFixed(1) + ' χλμ';
                    statusEl.innerHTML = '🚶 Απομένουν: ' + remainingText;
                }
            }
        }

        // ============================================================
        //  EVENTS
        // ============================================================
        document.getElementById('locateBtn')?.addEventListener('click', locateUser);
        document.getElementById('bottomLocateBtn')?.addEventListener('click', locateUser);
        document.getElementById('navBtn')?.addEventListener('click', toggleNavigation);
        document.getElementById('bottomNavBtn')?.addEventListener('click', toggleNavigation);
        document.getElementById('closeNavBtn')?.addEventListener('click', closeNavigation);
        document.getElementById('minimizeNavBtn')?.addEventListener('click', minimizeNavigation);
        document.getElementById('miniExpandBtn')?.addEventListener('click', expandNavigation);
        document.getElementById('clearBtn')?.addEventListener('click', clearAll);
        document.getElementById('bottomClearBtn')?.addEventListener('click', clearAll);
        document.getElementById('speedSelect')?.addEventListener('change', updateInfo);
        document.getElementById('saveRouteBtn')?.addEventListener('click', saveRoute);
        document.getElementById('photoBtn')?.addEventListener('click', function() { takePhoto(); });
        document.getElementById('bottomPhotoBtn')?.addEventListener('click', function() { takePhoto(); });
        document.getElementById('floatingPhotoBtn')?.addEventListener('click', function() { takePhoto(); });
        document.getElementById('navPhotoBtn')?.addEventListener('click', function() { takePhoto(); });
        
        var touchStartY = 0;
        var navPanel = document.getElementById('navigationPanel');
        navPanel.addEventListener('touchstart', function(e) {
            touchStartY = e.touches[0].clientY;
        });
        navPanel.addEventListener('touchmove', function(e) {
            if (!isNavigating || isMinimized) return;
            var deltaY = e.touches[0].clientY - touchStartY;
            if (deltaY > 80) {
                minimizeNavigation();
            }
        });
        
        document.addEventListener('click', function(e) {
            var list = document.getElementById('savedRoutesList');
            if (list.classList.contains('active') && !e.target.closest('#savedRoutesList') && !e.target.closest('#saveRouteBtn')) {
                list.classList.remove('active');
            }
        });

        document.getElementById('helpBtn')?.addEventListener('click', function() {
            alert('🧭 Athos Path Finder\n\n' +
                  '📍 Κλικ στον χάρτη → Start / End / Ενδιάμεσο / Φωτογραφία\n' +
                  '📍 Θέση μου → Εντοπισμός με GPS ή IP (συνεχής παρακολούθηση)\n' +
                  '🧭 Πλοήγηση → Οδηγίες βήμα-βήμα με παρακολούθηση θέσης\n' +
                  '⬇ Ελαχιστοποίηση → Μικρή μπάρα με απόσταση\n' +
                  '📸 Φωτογραφία → Λήψη με κάμερα ή επιλογή από συλλογή\n' +
                  '⏺️ Καταγραφή → Καταγραφή της διαδρομής που περπατάτε\n' +
                  '💾 Αποθήκευση → Τοπική αποθήκευση διαδρομής\n' +
                  '📤 GPX → Εξαγωγή διαδρομής\n' +
                  '📂 GPX/KML → Φόρτωση αρχείου\n' +
                  '🗺️ Διαδρομές → Αποθήκευση, φόρτωση και διαγραφή διαδρομών\n' +
                  '📥 Κατέβασμα → Λήψη χάρτη για offline χρήση\n\n' +
                  '📸 Αυτόματη φωτογραφία σε Start / End / Ενδιάμεσα!\n' +
                  '📍 Το στίγμα σας παρακολουθείται συνεχώς!\n' +
                  '📱 Βελτιστοποιημένο για κινητά');
        });

        // ============================================================
        //  ΕΚΚΙΝΗΣΗ
        // ============================================================
        resetInfo();
        updatePhotoList();
        console.log('🚀 Athos Path Finder έτοιμο!');
        console.log('📍 Πατήστε "Θέση μου" για συνεχή παρακολούθηση');
        console.log('📸 Αυτόματη φωτογραφία σε Start/End/Ενδιάμεσα!');
        
        var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        if (isMobile) {
            setTimeout(function() {
                locateUser();
            }, 1500);
        }
    </script>
