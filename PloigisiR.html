                return JSON.parse(localStorage.getItem('athos_saved_routes') || '[]'); 
            } catch(e) { 
                return []; 
            } 
        }
        
        function saveRoutesToStorage(routes) { 
            localStorage.setItem('athos_saved_routes', JSON.stringify(routes)); 
        }

        function showRoutesList() {
            var routes = getSavedRoutes();
            var container = document.getElementById('routesList');
            routes.sort(function(a, b) { return a.name.localeCompare(b.name, 'el'); });
            if (routes.length === 0) { 
                container.innerHTML = '<div style="color:#999;padding:12px;text-align:center;font-size:12px;">📭 Δεν υπάρχουν αποθηκευμένες διαδρομές</div>'; 
                return; 
            }
            var html = '';
            for (var i = 0; i < routes.length; i++) {
                var route = routes[i];
                var date = new Date(route.date).toLocaleDateString('el');
                var dist = route.distance ? route.distance.toFixed(1) + ' km' : '';
                var photoCount = (route.photoIds || []).length;
                var start = route.startName || 'Αφετηρία', end = route.endName || 'Προορισμός';
                html += '<div class="route-item" data-id="' + route.id + '"><div class="info"><div class="name">📍 ' + route.name + ' <span style="font-size:10px;color:#8e44ad;">📸' + photoCount + '</span></div><div class="details">' + start + ' → ' + end + ' · ' + dist + ' · ' + date + '</div></div><div class="actions"><button class="load-btn" data-id="' + route.id + '" title="Φόρτωση διαδρομής">📂</button><button class="delete-btn" data-id="' + route.id + '" title="Διαγραφή διαδρομής">✖</button></div></div>';
            }
            container.innerHTML = html;
            
            container.querySelectorAll('.load-btn').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var id = this.dataset.id;
                    var route = getSavedRoutes().find(function(r) { return r.id === id; });
                    if (route) {
                        loadRouteDirect(route);
                    }
                    hideRouteDropdown();
                });
            });
            
            container.querySelectorAll('.delete-btn').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var id = this.dataset.id;
                    if (confirm('Θέλετε να διαγράψετε αυτή τη διαδρομή;')) {
                        var routes = getSavedRoutes().filter(function(r) { return r.id !== id; });
                        saveRoutesToStorage(routes);
                        showRoutesList();
                        showToast('🗑️ Διαγράφηκε διαδρομή', '#e74c3c');
                    }
                });
            });
            
            container.querySelectorAll('.route-item').forEach(function(el) {
                el.addEventListener('click', function() {
                    var id = this.dataset.id;
                    var route = getSavedRoutes().find(function(r) { return r.id === id; });
                    if (route) {
                        loadRouteDirect(route);
                    }
                    hideRouteDropdown();
                });
            });
        }

        function saveRoute() {
            if (!lastMainGeometry || lastMainGeometry.length < 2) { 
                alert('Δεν υπάρχει διαδρομή για αποθήκευση. Δημιουργήστε πρώτα μια διαδρομή (Start → End).'); 
                return; 
            }
            var name = prompt('Όνομα διαδρομής:', 'Διαδρομή ' + new Date().toLocaleDateString('el'));
            if (!name) return;
            
            var routeId = generateRouteId();
            var routeData = { 
                id: routeId, 
                name: name, 
                geometry: lastMainGeometry, 
                distance: lastMainDistance, 
                date: new Date().toISOString(), 
                startName: startName || 'Αφετηρία', 
                endName: endName || 'Προορισμός', 
                startPhoto: startPhoto,
                endPhoto: endPhoto,
                waypoints: waypoints.map(function(p, i) { 
                    return { lat: p.lat, lng: p.lng, name: waypointNames[i] || 'Σημείο', photo: waypointPhotos[i] || null };
                }),
                photoIds: routePhotos.map(function(p) { return p.image; })
            };
            
            var saved = getSavedRoutes();
            // Έλεγχος για διπλότυπα
            var exists = saved.some(function(r) { return r.id === routeId; });
            if (!exists) {
                saved.push(routeData);
                saveRoutesToStorage(saved);
            }
            showRoutesList();
            showToast('✅ Αποθηκεύτηκε: ' + name, '#2ecc71');
            alert('✅ Η διαδρομή "' + name + '" αποθηκεύτηκε με ' + routePhotos.length + ' φωτογραφίες!');
        }

        function loadRouteDirect(route) {
            if (!route.geometry || route.geometry.length < 2) { 
                alert('Μη έγκυρη διαδρομή.'); 
                return; 
            }
            clearAll();
            lastMainGeometry = route.geometry;
            lastMainDistance = route.distance || computeDistanceFromCoords(route.geometry);
            
            startPhoto = route.startPhoto || null;
            endPhoto = route.endPhoto || null;
            
            var latlngs = route.geometry.map(function(c) { return [c[1], c[0]]; });
            var line = L.polyline(latlngs, { color: '#2c5f2d', weight: 5, opacity: 0.8 }).addTo(map);
            routeLines.push(line);
            map.fitBounds(line.getBounds(), { padding: [40,40] });
            
            if (route.waypoints && route.waypoints.length > 0) {
                for (var i = 0; i < route.waypoints.length; i++) {
                    var wp = route.waypoints[i];
                    var latlng = L.latLng(wp.lat, wp.lng);
                    waypoints.push(latlng);
                    waypointNames.push(wp.name || 'Σημείο ' + (i + 1));
                    waypointPhotos.push(wp.photo || null);
                    var marker = L.marker(latlng, { icon: getColorIcon('blue'), draggable: true }).addTo(map);
                    updateWaypointPopup(marker, i);
                    (function(idx) { marker.on('dragend', function(e) { waypoints[idx] = e.target.getLatLng(); calculateRoute(); }); })(i);
                    markers.push(marker);
                }
                updateWaypointsPanel();
            }
            
            if (route.photoIds && route.photoIds.length > 0) {
                routePhotos = route.photoIds.map(function(img, idx) {
                    var lat = route.geometry[0] ? route.geometry[0][1] || 0 : 0;
                    var lng = route.geometry[0] ? route.geometry[0][0] || 0 : 0;
                    return { image: img, lat: lat, lng: lng, note: '', filename: 'photo.jpg', timestamp: new Date().toISOString() };
                });
                for (var i = 0; i < routePhotos.length; i++) {
                    (function(photo) {
                        try {
                            var photoIcon = L.divIcon({ className: 'photo-marker', html: '<img src="' + photo.image + '" alt="photo" onerror="this.style.display=\'none\'">', iconSize: [36, 36], iconAnchor: [18, 18] });
                            var marker = L.marker([photo.lat, photo.lng], { icon: photoIcon }).addTo(map).bindPopup('<div class="photo-detail-popup"><img src="' + photo.image + '" alt="photo" style="max-width:180px;max-height:180px;border-radius:8px;" onerror="this.parentElement.innerHTML=\'⚠️ Η φωτογραφία δεν είναι διαθέσιμη\'"><div class="note">' + (photo.note || 'Χωρίς σημείωση') + '</div><div class="time">' + new Date(photo.timestamp).toLocaleString('el') + '</div></div>');
                            photoMarkers.push(marker);
                        } catch(e) { console.warn('Σφάλμα κατά την προσθήκη φωτογραφίας:', e); }
                    })(routePhotos[i]);
                }
                updatePhotoList();
            }
            
            var first = route.geometry[0], last = route.geometry[route.geometry.length - 1];
            startPoint = { lat: first[1], lng: first[0] }; endPoint = { lat: last[1], lng: last[0] };
            startName = route.startName || 'Αφετηρία'; endName = route.endName || 'Προορισμός';
            if (startMarker) map.removeLayer(startMarker);
            startMarker = L.marker([first[1], first[0]], { icon: getColorIcon('green') }).addTo(map).bindPopup('🚩 ' + startName);
            if (endMarker) map.removeLayer(endMarker);
            endMarker = L.marker([last[1], last[0]], { icon: getColorIcon('red') }).addTo(map).bindPopup('🏁 ' + endName);
            updateInfo(); updateWaypointsPanel();
            saveLastRouteState();
            var photoCount = (route.photoIds || []).length, waypointCount = (route.waypoints || []).length;
            showToast('✅ Φορτώθηκε: ' + route.name + ' με ' + photoCount + ' φωτογραφίες και ' + waypointCount + ' σημεία', '#2ecc71');
        }

        // ============================================================
        function makeDraggable(element, handleSelector, storageKey) {
            if (!element) return;
            var dragData = { isDragging: false, startX: 0, startY: 0, origX: 0, origY: 0 };
            var handle = handleSelector ? element.querySelector(handleSelector) : element;
            if (!handle) return;
            function loadPosition() {
                if (!storageKey) return;
                try { var data = localStorage.getItem(storageKey); if (!data) return; var pos = JSON.parse(data); if (pos.left < 0 || pos.top < 0 || pos.left > window.innerWidth - 100 || pos.top > window.innerHeight - 100) return; element.style.position = 'fixed'; element.style.left = pos.left + 'px'; element.style.top = pos.top + 'px'; element.style.bottom = 'auto'; element.style.right = 'auto'; element.style.transform = 'none'; if (pos.width) { element.style.width = pos.width + 'px'; } } catch(e) {}
            }
            function savePosition() {
                if (!storageKey || dragData.isDragging) return;
                var rect = element.getBoundingClientRect();
                try { localStorage.setItem(storageKey, JSON.stringify({ left: rect.left, top: rect.top, width: rect.width })); } catch(e) {}
            }
            function startDrag(clientX, clientY) {
                var rect = element.getBoundingClientRect();
                dragData.isDragging = true;
                dragData.startX = clientX; dragData.startY = clientY;
                dragData.origX = rect.left; dragData.origY = rect.top;
                element.style.position = 'fixed'; element.style.left = rect.left + 'px'; element.style.top = rect.top + 'px';
                element.style.bottom = 'auto'; element.style.right = 'auto'; element.style.transform = 'none';
                element.style.cursor = 'grabbing'; element.classList.add('draggable');
                document.body.style.userSelect = 'none';
            }
            function moveDrag(clientX, clientY) {
                if (!dragData.isDragging) return;
                var dx = clientX - dragData.startX, dy = clientY - dragData.startY;
                var newX = dragData.origX + dx, newY = dragData.origY + dy;
                var rect = element.getBoundingClientRect();
                var maxX = window.innerWidth - rect.width - 10, maxY = window.innerHeight - rect.height - 10;
                newX = Math.max(10, Math.min(maxX, newX)); newY = Math.max(10, Math.min(maxY, newY));
                element.style.left = newX + 'px'; element.style.top = newY + 'px';
            }
            function endDrag() { dragData.isDragging = false; element.style.cursor = ''; document.body.style.userSelect = ''; savePosition(); }
            handle.addEventListener('mousedown', function(e) { if (e.target.closest('button') || e.target.closest('input') || e.target.closest('select')) return; startDrag(e.clientX, e.clientY); e.preventDefault(); });
            document.addEventListener('mousemove', function(e) { if (!dragData.isDragging) return; moveDrag(e.clientX, e.clientY); e.preventDefault(); });
            document.addEventListener('mouseup', function(e) { if (dragData.isDragging) { endDrag(); e.preventDefault(); } });
            handle.addEventListener('touchstart', function(e) { if (e.target.closest('button') || e.target.closest('input') || e.target.closest('select')) return; var touch = e.touches[0]; startDrag(touch.clientX, touch.clientY); e.preventDefault(); }, { passive: false });
            document.addEventListener('touchmove', function(e) { if (!dragData.isDragging) return; var touch = e.touches[0]; moveDrag(touch.clientX, touch.clientY); e.preventDefault(); }, { passive: false });
            document.addEventListener('touchend', function(e) { if (dragData.isDragging) { endDrag(); e.preventDefault(); } }, { passive: false });
            loadPosition();
            var observer = new MutationObserver(function() { if (element.style.display === 'none' || !element.classList.contains('active')) { savePosition(); } });
            observer.observe(element, { attributes: true, attributeFilter: ['style', 'class'] });
            return { savePosition: savePosition, loadPosition: loadPosition };
        }

            var routesPanel = document.getElementById('routeDropdownContainer');
            if (routesPanel) { routesPanel.classList.add('draggable'); var routesHeader = routesPanel.querySelector('.routes-header'); if (routesHeader && !routesHeader.querySelector('.panel-drag-handle')) { var dragHandle = document.createElement('span'); dragHandle.className = 'panel-drag-handle'; dragHandle.innerHTML = '<span class="dots">⠿</span>'; dragHandle.style.cssText = 'cursor:grab;padding:2px 6px;'; routesHeader.insertBefore(dragHandle, routesHeader.firstChild); } makeDraggable(routesPanel, '.routes-header', 'routes_panel_position'); }
